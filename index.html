<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasir Pintar Mobile</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg-light: #f3f4f6;
            --text-dark: #1f2937;
            --text-gray: #6b7280;
            --white: #ffffff;
            --border: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            padding-bottom: 80px; /* Space for bottom nav */
        }

        /* Utility Classes */
        .hidden { display: none !important; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .gap-2 { gap: 0.5rem; }
        .gap-4 { gap: 1rem; }
        .mt-4 { margin-top: 1rem; }
        .mb-4 { margin-bottom: 1rem; }
        .p-4 { padding: 1rem; }
        .w-full { width: 100%; }
        .font-bold { font-weight: 700; }
        .text-sm { font-size: 0.875rem; }
        .text-center { text-align: center; }
        .text-right { text-align: right; }

        /* Components */
        .btn {
            padding: 12px 16px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 1rem;
        }
        .btn:active { opacity: 0.8; }
        .btn-primary { background-color: var(--primary); color: var(--white); }
        .btn-success { background-color: var(--success); color: var(--white); }
        .btn-danger { background-color: var(--danger); color: var(--white); }
        .btn-outline { background-color: transparent; border: 1px solid var(--border); color: var(--text-dark); }
        .btn-icon { padding: 8px; border-radius: 50%; width: 36px; height: 36px; }

        .card {
            background: var(--white);
            border-radius: 12px;
            padding: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 12px;
        }

        .input-group {
            margin-bottom: 12px;
        }
        .input-group label {
            display: block;
            margin-bottom: 4px;
            font-size: 0.9rem;
            color: var(--text-gray);
        }
        .input-field {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }
        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        /* Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--white);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 100;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-gray);
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
        }
        .nav-item.active {
            color: var(--primary);
            font-weight: 600;
        }
        .nav-icon {
            font-size: 1.5rem;
            margin-bottom: 2px;
        }

        /* Product List */
        .product-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        .product-item:last-child { border-bottom: none; }
        .product-info h4 { font-size: 1rem; margin-bottom: 4px; }
        .product-meta { font-size: 0.85rem; color: var(--text-gray); }
        .stock-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .stock-ok { background-color: #d1fae5; color: #065f46; }
        .stock-low { background-color: #fee2e2; color: #991b1b; }

        /* Cart */
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .qty-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .qty-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--white);
            width: 90%;
            max-width: 400px;
            border-radius: 12px;
            padding: 20px;
            transform: translateY(20px);
            transition: transform 0.3s;
        }
        .modal-overlay.open .modal-content { transform: translateY(0); }
        
        /* Scanner Simulation Line */
        .scan-line {
            height: 2px;
            width: 100%;
            background: var(--danger);
            position: absolute;
            top: 0;
            animation: scan 1.5s infinite linear;
            box-shadow: 0 0 4px var(--danger);
        }
        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-dark);
            color: var(--white);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="p-4 bg-white shadow-sm" style="position: sticky; top: 0; z-index: 10;">
        <div class="flex justify-between items-center">
            <h1 id="page-title" class="font-bold" style="font-size: 1.25rem;">Kasir</h1>
            <button id="scan-btn" class="btn btn-primary" onclick="openScanner()">
                <span>🔍 Scan</span>
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="app-container" class="p-4">
        <!-- Views will be injected here via JS -->
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchView('pos')">
            <span class="nav-icon">🛒</span>
            <span>Kasir</span>
        </button>
        <button class="nav-item" onclick="switchView('products')">
            <span class="nav-icon">📦</span>
            <span>Stok</span>
        </button>
        <button class="nav-item" onclick="switchView('history')">
            <span class="nav-icon">📄</span>
            <span>Riwayat</span>
        </button>
    </nav>

    <!-- Scanner Modal -->
    <div id="scanner-modal" class="modal-overlay">
        <div class="modal-content text-center">
            <h3 class="mb-4">Scan Barcode</h3>
            <div style="width: 250px; height: 250px; background: #000; margin: 0 auto 20px; position: relative; overflow: hidden; border-radius: 8px;">
                <div class="scan-line"></div>
                <div style="color: white; margin-top: 120px; font-size: 0.8rem;">[ Simulasi Kamera ]</div>
            </div>
            <p class="text-sm text-gray-500 mb-4">Arahkan kamera ke barcode produk</p>
            
            <div class="flex gap-2 justify-center mb-4">
                <input type="text" id="manual-scan-input" class="input-field" placeholder="Ketik kode manual..." style="flex:1;">
                <button class="btn btn-primary" onclick="processScan()">OK</button>
            </div>
            
            <button class="btn btn-outline w-full" onclick="closeScanner()">Batal</button>
        </div>
    </div>

    <!-- Add/Edit Product Modal -->
    <div id="product-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="mb-4" id="product-modal-title">Tambah Produk</h3>
            <form id="product-form" onsubmit="handleProductSubmit(event)">
                <input type="hidden" id="prod-id">
                <div class="input-group">
                    <label>Kode Barcode</label>
                    <input type="text" id="prod-code" class="input-field" required placeholder="Contoh: 899123456">
                </div>
                <div class="input-group">
                    <label>Nama Produk</label>
                    <input type="text" id="prod-name" class="input-field" required placeholder="Nama barang">
                </div>
                <div class="flex gap-4">
                    <div class="input-group w-full">
                        <label>Harga (Rp)</label>
                        <input type="number" id="prod-price" class="input-field" required placeholder="0">
                    </div>
                    <div class="input-group w-full">
                        <label>Stok Awal</label>
                        <input type="number" id="prod-stock" class="input-field" required placeholder="0">
                    </div>
                </div>
                <div class="flex gap-2 mt-4">
                    <button type="button" class="btn btn-outline w-full" onclick="closeProductModal()">Batal</button>
                    <button type="submit" class="btn btn-primary w-full">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">Pesan notifikasi</div>

    <script>
        // --- State Management ---
        const state = {
            products: [],
            cart: [],
            transactions: [],
            currentView: 'pos'
        };

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            // Seed data if empty for demonstration
            if (state.products.length === 0) {
                seedData();
            }
            renderView();
        });

        function seedData() {
            const demoProducts = [
                { id: 1, code: '8991', name: 'Air Mineral 600ml', price: 3500, stock: 50 },
                { id: 2, code: '8992', name: 'Roti Coklat', price: 5000, stock: 20 },
                { id: 3, code: '8993', name: 'Kopi Instan', price: 1500, stock: 100 }
            ];
            state.products = demoProducts;
            saveData();
        }

        function loadData() {
            const savedProducts = localStorage.getItem('kasir_products');
            const savedTrans = localStorage.getItem('kasir_transactions');
            if (savedProducts) state.products = JSON.parse(savedProducts);
            if (savedTrans) state.transactions = JSON.parse(savedTrans);
        }

        function saveData() {
            localStorage.setItem('kasir_products', JSON.stringify(state.products));
            localStorage.setItem('kasir_transactions', JSON.stringify(state.transactions));
        }

        // --- Navigation ---
        function switchView(viewName) {
            state.currentView = viewName;
            
            // Update Nav UI
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            // Simple selector logic based on onclick attribute text match or index
            const index = ['pos', 'products', 'history'].indexOf(viewName);
            if(index >= 0) document.querySelectorAll('.nav-item')[index].classList.add('active');

            // Update Header Title
            const titles = { 'pos': 'Kasir / Scan', 'products': 'Manajemen Stok', 'history': 'Riwayat Transaksi' };
            document.getElementById('page-title').innerText = titles[viewName];

            // Show/Hide Scan Button
            const scanBtn = document.getElementById('scan-btn');
            scanBtn.style.display = viewName === 'pos' ? 'inline-flex' : 'none';

            renderView();
        }

        // --- Rendering Logic ---
        function renderView() {
            const container = document.getElementById('app-container');
            container.innerHTML = '';

            if (state.currentView === 'pos') {
                renderPOS(container);
            } else if (state.currentView === 'products') {
                renderProducts(container);
            } else if (state.currentView === 'history') {
                renderHistory(container);
            }
        }

        // 1. POS View
        function renderPOS(container) {
            // Cart Summary
            const cartCard = document.createElement('div');
            cartCard.className = 'card mb-4';
            
            let total = 0;
            let cartHTML = '';
            if (state.cart.length === 0) {
                cartHTML = '<p class="text-center text-gray-500 py-4">Keranjang kosong</p>';
            } else {
                state.cart.forEach((item, index) => {
                    const subtotal = item.price * item.qty;
                    total += subtotal;
                    cartHTML += `
                        <div class="cart-item">
                            <div style="flex:1;">
                                <div class="font-bold">${item.name}</div>
                                <div class="text-sm text-gray-500">Rp ${item.price.toLocaleString('id-ID')} x ${item.qty}</div>
                            </div>
                            <div class="flex items-center gap-4">
                                <div class="font-bold">Rp ${subtotal.toLocaleString('id-ID')}</div>
                                <div class="qty-control">
                                    <div class="qty-btn" onclick="updateCartQty(${index}, -1)">-</div>
                                    <span>${item.qty}</span>
                                    <div class="qty-btn" onclick="updateCartQty(${index}, 1)">+</div>
                                </div>
                                <div style="color:var(--danger); cursor:pointer;" onclick="removeFromCart(${index})">✕</div>
                            </div>
                        </div>
                    `;
                });
            }

            cartCard.innerHTML = `
                ${cartHTML}
                <div style="border-top: 1px solid var(--border); margin-top: 10px; padding-top: 10px;">
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-lg">Total</span>
                        <span class="font-bold text-lg text-primary">Rp ${total.toLocaleString('id-ID')}</span>
                    </div>
                </div>
                <button class="btn btn-primary w-full mt-4" ${state.cart.length === 0 ? 'disabled style="opacity:0.5"' : ''} onclick="checkout()">
                    Bayar Sekarang
                </button>
            `;
            container.appendChild(cartCard);

            // Product Search List (Quick Add)
            const searchCard = document.createElement('div');
            searchCard.className = 'card';
            searchCard.innerHTML = `
                <div class="input-group">
                    <input type="text" id="pos-search" class="input-field" placeholder="Cari nama barang..." onkeyup="renderProductList(this.value)">
                </div>
                <div id="pos-product-list" class="product-list">
                    <!-- List populated below -->
                </div>
            `;
            container.appendChild(searchCard);
            renderProductList('');
        }

        function renderProductList(filter = '') {
            const listContainer = document.getElementById('pos-product-list');
            if(!listContainer) return;

            const filtered = state.products.filter(p => 
                p.name.toLowerCase().includes(filter.toLowerCase()) || 
                p.code.includes(filter)
            );

            listContainer.innerHTML = filtered.map(p => `
                <div class="product-item" onclick="addToCart(${p.id})">
                    <div class="product-info">
                        <h4>${p.name}</h4>
                        <div class="product-meta">Kode: ${p.code} | Stok: ${p.stock}</div>
                    </div>
                    <div class="font-bold text-primary">
                        Rp ${p.price.toLocaleString('id-ID')}
                        <div class="text-sm text-gray-400">+ Tambah</div>
                    </div>
                </div>
            `).join('');
        }

        // 2. Products Management View
        function renderProducts(container) {
            const toolbar = document.createElement('div');
            toolbar.className = 'flex justify-between items-center mb-4';
            toolbar.innerHTML = `
                <h2 class="font-bold">Daftar Barang</h2>
                <button class="btn btn-primary text-sm" onclick="openProductModal()">+ Barang Baru</button>
            `;
            container.appendChild(toolbar);

            const listCard = document.createElement('div');
            listCard.className = 'card';
            
            if(state.products.length === 0) {
                listCard.innerHTML = '<p class="text-center p-4">Belum ada barang.</p>';
            } else {
                listCard.innerHTML = state.products.map(p => `
                    <div class="product-item">
                        <div class="product-info">
                            <h4>${p.name}</h4>
                            <div class="product-meta">Barcode: ${p.code}</div>
                            <div class="product-meta mt-4">Rp ${p.price.toLocaleString('id-ID')}</div>
                        </div>
                        <div class="text-right">
                            <div class="stock-badge ${p.stock < 10 ? 'stock-low' : 'stock-ok'}">Stok: ${p.stock}</div>
                            <div class="mt-4 flex gap-2 justify-end">
                                <button class="btn-icon bg-light" onclick="openProductModal(${p.id})">✏️</button>
                                <button class="btn-icon" style="background:#fee2e2; color:#b91c1c;" onclick="deleteProduct(${p.id})">🗑️</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
            container.appendChild(listCard);
        }

        // 3. History View
        function renderHistory(container) {
            if (state.transactions.length === 0) {
                container.innerHTML = '<div class="card text-center"><p>Belum ada transaksi.</p></div>';
                return;
            }

            // Show latest first
            const reversedTrans = [...state.transactions].reverse();
            
            reversedTrans.forEach(t => {
                const date = new Date(t.date).toLocaleString('id-ID');
                const itemHTML = t.items.map(i => `
                    <div class="flex justify-between text-sm">
                        <span>${i.name} x${i.qty}</span>
                        <span>Rp ${(i.price * i.qty).toLocaleString('id-ID')}</span>
                    </div>
                `).join('');

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-2" style="border-bottom:1px dashed #ccc; padding-bottom:8px;">
                        <div>
                            <div class="font-bold">#${t.id}</div>
                            <div class="text-sm text-gray-500">${date}</div>
                        </div>
                        <div class="font-bold text-success">Rp ${t.total.toLocaleString('id-ID')}</div>
                    </div>
                    <div class="mb-2">
                        ${itemHTML}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- Actions: POS / Cart ---
        function addToCart(productId) {
            const product = state.products.find(p => p.id === productId);
            if (!product) return;

            if (product.stock <= 0) {
                showToast('Stok habis!', 'error');
                return;
            }

            const existingItem = state.cart.find(c => c.id === productId);
            
            // Check stock availability against cart
            const currentQtyInCart = existingItem ? existingItem.qty : 0;
            if (currentQtyInCart + 1 > product.stock) {
                showToast('Stok tidak mencukupi!', 'error');
                return;
            }

            if (existingItem) {
                existingItem.qty++;
            } else {
                state.cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    code: product.code,
                    qty: 1
                });
            }
            renderPOS();
            // Scroll to top to see cart
            window.scrollTo(0, 0);
            showToast('Barang ditambahkan');
        }

        function updateCartQty(index, change) {
            const item = state.cart[index];
            const product = state.products.find(p => p.id === item.id);

            const newQty = item.qty + change;
            
            if (newQty <= 0) {
                removeFromCart(index);
                return;
            }

            if (newQty > product.stock) {
                showToast('Mencapai batas stok', 'error');
                return;
            }

            item.qty = newQty;
            renderPOS();
        }

        function removeFromCart(index) {
            state.cart.splice(index, 1);
            renderPOS();
        }

        function checkout() {
            if (state.cart.length === 0) return;

            if(!confirm('Proses pembayaran dan kurangi stok?')) return;

            let total = 0;
            const itemsToSave = [];

            // Deduct Stock
            state.cart.forEach(cartItem => {
                const product = state.products.find(p => p.id === cartItem.id);
                if (product) {
                    product.stock -= cartItem.qty;
                    total += cartItem.price * cartItem.qty;
                    itemsToSave.push({
                        name: product.name,
                        qty: cartItem.qty,
                        price: product.price
                    });
                }
            });

            // Record Transaction
            const transaction = {
                id: Date.now().toString().slice(-6),
                date: new Date().toISOString(),
                items: itemsToSave,
                total: total
            };
            state.transactions.push(transaction);

            // Clear Cart
            state.cart = [];
            
            saveData();
            renderPOS(); // Updates stock display too if needed
            showToast('Transaksi Berhasil!');
        }

        // --- Actions: Products ---
        function handleProductSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('prod-id').value;
            const code = document.getElementById('prod-code').value;
            const name = document.getElementById('prod-name').value;
            const price = parseInt(document.getElementById('prod-price').value);
            const stock = parseInt(document.getElementById('prod-stock').value);

            if (id) {
                // Edit
                const index = state.products.findIndex(p => p.id == id);
                if (index !== -1) {
                    state.products[index] = { ...state.products[index], code, name, price, stock };
                    showToast('Produk diperbarui');
                }
            } else {
                // New
                const newProduct = {
                    id: Date.now(),
                    code, name, price, stock
                };
                state.products.push(newProduct);
                showToast('Produk ditambahkan');
            }

            saveData();
            closeProductModal();
            renderView();
        }

        function deleteProduct(id) {
            if(confirm('Hapus produk ini?')) {
                state.products = state.products.filter(p => p.id !== id);
                saveData();
                renderView();
                showToast('Produk dihapus');
            }
        }

        // --- Scanner Logic ---
        function openScanner() {
            document.getElementById('scanner-modal').classList.add('open');
            document.getElementById('manual-scan-input').focus();
        }

        function closeScanner() {
            document.getElementById('scanner-modal').classList.remove('open');
            document.getElementById('manual-scan-input').value = '';
        }

        function processScan() {
            const input = document.getElementById('manual-scan-input');
            const code = input.value.trim();
            
            if (!code) return;

            const product = state.products.find(p => p.code === code);
            
            if (product) {
                addToCart(product.id);
                closeScanner();
                showToast(`Scan: ${product.name}`);
            } else {
                showToast('Barcode tidak ditemukan!', 'error');
                // Optional: Switch to add product view with code filled
            }
        }

        // --- Modal Helpers ---
        function openProductModal(id = null) {
            const modal = document.getElementById('product-modal');
            const title = document.getElementById('product-modal-title');
            
            // Reset form
            document.getElementById('product-form').reset();
            document.getElementById('prod-id').value = '';

            if (id) {
                title.innerText = 'Edit Produk';
                const p = state.products.find(prod => prod.id === id);
                if (p) {
                    document.getElementById('prod-id').value = p.id;
                    document.getElementById('prod-code').value = p.code;
                    document.getElementById('prod-name').value = p.name;
                    document.getElementById('prod-price').value = p.price;
                    document.getElementById('prod-stock').value = p.stock;
                }
            } else {
                title.innerText = 'Tambah Produk';
            }
            
            modal.classList.add('open');
        }

        function closeProductModal() {
            document.getElementById('product-modal').classList.remove('open');
        }

        // --- Utilities ---
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.background = type === 'error' ? 'var(--danger)' : 'var(--text-dark)';
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

    </script>
</body>
</html>
