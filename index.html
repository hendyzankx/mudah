<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasir Satu Layar</title>
    <!-- Icon Library -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --primary-dark: #3a0ca3;
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --danger: #ef233c;
            --success: #2ec4b6;
            --border: #e2e8f0;
            --nav-height: 60px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- HEADER --- */
        header {
            background: var(--bg-card);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .app-title { font-size: 1.2rem; font-weight: 800; color: var(--primary); margin: 0; }
        
        .search-wrapper { position: relative; }
        .search-input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            border: 1px solid var(--border);
            border-radius: 25px;
            background: #f8fafc;
            font-size: 0.9rem;
        }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        /* --- MAIN LAYOUT (SPLIT SCREEN) --- */
        #page-pos {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 120px); /* Sisa ketinggian dikurangi header & nav */
            overflow: hidden;
        }

        /* Area Produk (Scrollable) */
        .product-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 250px; /* Ruang untuk panel keranjang bawah */
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .product-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            border: 1px solid transparent;
            transition: 0.2s;
            cursor: pointer;
        }

        .product-card:active { border-color: var(--primary); background: #f8fafc; }
        
        .p-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 5px; line-height: 1.2; }
        .p-price { color: var(--primary); font-weight: 700; font-size: 0.95rem; margin-top: auto; }
        .p-stock { font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; }

        /* Area Keranjang (Fixed Bottom) */
        .cart-panel {
            position: fixed;
            bottom: 70px; /* Di atas navbar */
            left: 0;
            width: 100%;
            background: var(--bg-card);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            z-index: 10;
            display: flex;
            flex-direction: column;
            max-height: 40vh;
            transition: transform 0.3s ease;
        }

        .cart-header {
            padding: 10px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            background: #fff;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }
        .cart-header h3 { margin: 0; font-size: 0.95rem; }
        .cart-summary-mini { font-size: 0.8rem; color: var(--text-muted); }

        .cart-items-container {
            overflow-y: auto;
            padding: 10px 20px;
            max-height: 200px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px dashed var(--border);
        }
        .cart-item:last-child { border-bottom: none; }

        .ci-info { flex: 1; }
        .ci-name { font-weight: 600; font-size: 0.9rem; display: block; }
        .ci-price { font-size: 0.8rem; color: var(--text-muted); }

        .ci-controls { display: flex; align-items: center; gap: 8px; }
        .btn-ci {
            width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border);
            background: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; cursor: pointer;
        }
        .ci-qty { font-weight: 700; font-size: 0.9rem; width: 20px; text-align: center; }

        .cart-footer {
            padding: 15px 20px;
            background: #fff;
            border-top: 1px solid var(--border);
        }

        .total-row {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 12px;
        }
        .total-label { font-size: 0.85rem; color: var(--text-muted); }
        .total-val { font-size: 1.4rem; font-weight: 800; color: var(--text-main); }

        .btn-checkout {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3);
            cursor: pointer;
        }

        /* --- STOCK & SETTINGS PAGE --- */
        main { display: none; height: 100%; overflow-y: auto; padding: 20px; padding-bottom: 80px; }
        main.active { display: block; }

        .inv-card {
            background: var(--bg-card); padding: 15px; border-radius: 12px;
            margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* --- BOTTOM NAV --- */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 65px;
            background: var(--bg-card); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 50; padding-bottom: 5px;
        }

        .nav-item {
            flex: 1; text-align: center; font-size: 0.75rem; color: var(--text-muted);
            background: none; border: none; display: flex; flex-direction: column; align-items: center;
            cursor: pointer;
        }
        .nav-item i { font-size: 1.3rem; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); }

        /* --- FAB SCAN --- */
        .fab-scan {
            position: fixed; bottom: 85px; right: 20px;
            width: 50px; height: 50px;
            background: var(--text-main); color: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: none; z-index: 30; cursor: pointer;
        }

        /* --- MODAL (Bottom Sheet) --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(3px);
            z-index: 100; display: none; align-items: flex-end;
        }
        .modal.open { display: flex; }
        .modal-content {
            background: var(--bg-card); width: 100%;
            border-top-left-radius: 25px; border-top-right-radius: 25px;
            padding: 25px; animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .modal-title { font-size: 1.2rem; font-weight: 800; margin: 0; }

        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 5px; color: var(--text-muted); }
        .form-input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; }

        /* --- TOAST --- */
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(0,0,0,0.8); color: white; padding: 10px 20px;
            border-radius: 30px; font-size: 0.9rem; z-index: 200; opacity: 0; transition: 0.3s;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* Print Area */
        @media print {
            body * { visibility: hidden; }
            #receipt-print-area, #receipt-print-area * { visibility: visible; }
            #receipt-print-area { position: absolute; left: 0; top: 0; width: 58mm; font-family: monospace; font-size: 12px; }
        }
        #receipt-print-area { display: none; }
    </style>
</head>
<body>

    <!-- HEADER (Selalu muncul di POS) -->
    <header id="main-header">
        <div class="header-top">
            <h1 class="app-title">Kasir<span style="color:#000">Mobile</span></h1>
            <i class="fas fa-cog" style="color:var(--text-muted); font-size:1.2rem;" onclick="app.nav('settings')"></i>
        </div>
        <div class="search-wrapper" id="search-bar">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-input" placeholder="Cari barang..." onkeyup="app.filterPos()">
        </div>
    </header>

    <!-- HALAMAN UTAMA: SPLIT VIEW KASIR -->
    <div id="page-pos" style="display:flex; flex-direction:column; height:calc(100vh - 60px);">
        
        <!-- 1. Area Produk (Scrollable) -->
        <div class="product-area">
            <div id="product-list" class="product-grid"></div>
        </div>

        <!-- 2. Area Keranjang (Fixed Bottom) -->
        <div class="cart-panel">
            <div class="cart-header" onclick="app.toggleCartDetail()">
                <div>
                    <h3><i class="fas fa-shopping-cart"></i> Keranjang</h3>
                    <span class="cart-summary-mini" id="cart-count-mini">0 Item</span>
                </div>
                <i class="fas fa-chevron-up" id="cart-chevron"></i>
            </div>
            
            <div class="cart-items-container" id="cart-list">
                <!-- Item cart di sini -->
                <div style="text-align:center; padding:20px; color:var(--text-muted); font-size:0.8rem;">
                    Keranjang kosong
                </div>
            </div>

            <div class="cart-footer">
                <div class="total-row">
                    <span class="total-label">Total</span>
                    <span class="total-val" id="cart-total">Rp 0</span>
                </div>
                <button class="btn-checkout" onclick="app.openCheckoutModal()">Bayar Sekarang</button>
            </div>
        </div>
    </div>

    <!-- HALAMAN STOK (Tersembunyi) -->
    <div id="page-stock" class="main-page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="margin:0;">Stok Barang</h2>
            <button onclick="app.openProductModal()" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px;">+ Tambah</button>
        </div>
        <div id="inventory-list"></div>
    </div>

    <!-- HALAMAN SETTING (Tersembunyi) -->
    <div id="page-settings" class="main-page">
        <h2 style="margin-top:0;">Pengaturan</h2>
        <div class="form-group">
            <label class="form-label">Nama Toko</label>
            <input type="text" id="set-store" class="form-input">
        </div>
        <button class="btn-checkout" onclick="app.saveSettings()">Simpan</button>
        <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
        <button class="btn-checkout" style="background:var(--danger);" onclick="app.resetData()">Reset Data</button>
    </div>

    <!-- NAVBAR BAWAH -->
    <nav class="nav-bar">
        <button class="nav-item active" onclick="app.nav('pos')">
            <i class="fas fa-cash-register"></i> Kasir
        </button>
        <button class="nav-item" onclick="app.nav('stock')">
            <i class="fas fa-boxes"></i> Stok
        </button>
    </nav>

    <!-- FAB SCAN (Hanya muncul di POS) -->
    <button class="fab-scan" id="fab-scan" onclick="app.openScanner()">
        <i class="fas fa-barcode"></i>
    </button>

    <!-- MODAL CHECKOUT (POPUP BAYAR) -->
    <div id="modal-checkout" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Pembayaran</h2>
                <i class="fas fa-times" style="cursor:pointer;" onclick="app.closeModal('modal-checkout')"></i>
            </div>
            
            <div style="text-align:center; margin-bottom:20px;">
                <div style="font-size:0.9rem; color:var(--text-muted);">Total Tagihan</div>
                <div id="checkout-total-display" style="font-size:2rem; font-weight:800; color:var(--primary);">Rp 0</div>
            </div>

            <div class="form-group">
                <label class="form-label">Uang Diterima</label>
                <input type="number" id="pay-input" class="form-input" placeholder="Masukkan jumlah..." onkeyup="app.calcChange()">
            </div>

            <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-size:1.1rem;">
                <span>Kembalian:</span>
                <span id="change-display" style="font-weight:bold; color:var(--success);">Rp 0</span>
            </div>

            <button class="btn-checkout" onclick="app.processCheckout()">
                <i class="fas fa-print"></i> Proses & Cetak
            </button>
        </div>
    </div>

    <!-- MODAL PRODUCT -->
    <div id="modal-product" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Produk</h2>
                <i class="fas fa-times" style="cursor:pointer;" onclick="app.closeModal('modal-product')"></i>
            </div>
            <form onsubmit="event.preventDefault(); app.saveProduct();">
                <input type="hidden" id="p-id">
                <div class="form-group">
                    <label class="form-label">Nama</label>
                    <input type="text" id="p-name" class="form-input" required>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div class="form-group">
                        <label class="form-label">Harga</label>
                        <input type="number" id="p-price" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Stok</label>
                        <input type="number" id="p-stock" class="form-input" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Barcode</label>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="p-barcode" class="form-input">
                        <button type="button" class="btn-ci" onclick="app.openScannerForForm()" style="width:45px; border-radius:8px;"><i class="fas fa-camera"></i></button>
                    </div>
                </div>
                <button type="submit" class="btn-checkout">Simpan</button>
                <button type="button" id="btn-delete" class="btn-checkout" style="background:var(--danger); margin-top:10px; display:none;" onclick="app.deleteProduct()">Hapus</button>
            </form>
        </div>
    </div>

    <!-- MODAL SCANNER -->
    <div id="modal-scanner" class="modal" style="align-items:center;">
        <div class="modal-content" style="width:90%; max-width:400px;">
            <div class="modal-header">
                <h2 class="modal-title">Scan</h2>
                <i class="fas fa-times" style="cursor:pointer;" onclick="app.closeScanner()"></i>
            </div>
            <div id="scanner-container" style="background:#000; height:250px; border-radius:10px; overflow:hidden;"></div>
        </div>
    </div>

    <!-- STRUK -->
    <div id="receipt-print-area"></div>

    <!-- TOAST -->
    <div id="toast" class="toast">Pesan</div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        const app = {
            data: { products: [], cart: [], settings: {store: "Toko"} },
            scanner: null,

            init: function() {
                this.loadData();
                this.renderProducts();
                this.renderCart();
                document.getElementById('set-store').value = this.data.settings.store;
                this.nav('pos');
            },

            nav: function(page) {
                document.querySelectorAll('.main-page, #page-pos').forEach(el => el.style.display = 'none');
                
                if(page === 'pos') {
                    document.getElementById('page-pos').style.display = 'flex';
                    document.getElementById('main-header').style.display = 'block';
                    document.getElementById('fab-scan').style.display = 'flex';
                    document.querySelectorAll('.nav-item')[0].classList.add('active');
                    document.querySelectorAll('.nav-item')[1].classList.remove('active');
                } else if (page === 'stock') {
                    document.getElementById('page-stock').style.display = 'block';
                    document.getElementById('main-header').style.display = 'none';
                    document.getElementById('fab-scan').style.display = 'none';
                    document.querySelectorAll('.nav-item')[0].classList.remove('active');
                    document.querySelectorAll('.nav-item')[1].classList.add('active');
                    this.renderInventory();
                } else if (page === 'settings') {
                    document.getElementById('page-settings').style.display = 'block';
                    document.getElementById('main-header').style.display = 'none';
                    document.getElementById('fab-scan').style.display = 'none';
                }
            },

            // --- POS ---
            renderProducts: function(filter="") {
                const container = document.getElementById('product-list');
                container.innerHTML = "";
                const list = this.data.products.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));

                list.forEach(p => {
                    const el = document.createElement('div');
                    el.className = 'product-card';
                    el.onclick = () => this.addToCart(p.id);
                    el.innerHTML = `
                        <div class="p-name">${p.name}</div>
                        <div class="p-price">Rp ${p.price.toLocaleString('id-ID')}</div>
                        <div class="p-stock">Stok: ${p.stock}</div>
                    `;
                    container.appendChild(el);
                });
            },

            filterPos: function() {
                const val = document.querySelector('.search-input').value;
                this.renderProducts(val);
            },

            // --- CART ---
            addToCart: function(id) {
                const p = this.data.products.find(x => x.id === id);
                const item = this.data.cart.find(x => x.id === id);
                const curQty = item ? item.qty : 0;

                if(p.stock <= curQty) {
                    this.showToast("Stok habis!", "error");
                    return;
                }

                if(item) item.qty++;
                else this.data.cart.push({ id: p.id, name: p.name, price: p.price, qty: 1 });
                
                this.renderCart();
                this.showToast("Masuk keranjang");
            },

            renderCart: function() {
                const container = document.getElementById('cart-list');
                container.innerHTML = "";
                let total = 0;
                let count = 0;

                if(this.data.cart.length === 0) {
                    container.innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-muted); font-size:0.8rem;">Keranjang kosong</div>`;
                    document.getElementById('cart-total').innerText = "Rp 0";
                    document.getElementById('cart-total').dataset.raw = 0;
                    document.getElementById('cart-count-mini').innerText = "0 Item";
                    return;
                }

                this.data.cart.forEach((item, idx) => {
                    total += item.price * item.qty;
                    count += item.qty;
                    const el = document.createElement('div');
                    el.className = 'cart-item';
                    el.innerHTML = `
                        <div class="ci-info">
                            <span class="ci-name">${item.name}</span>
                            <span class="ci-price">@${item.price.toLocaleString()}</span>
                        </div>
                        <div class="ci-controls">
                            <div class="btn-ci" onclick="app.changeQty(${idx}, -1)">-</div>
                            <div class="ci-qty">${item.qty}</div>
                            <div class="btn-ci" onclick="app.changeQty(${idx}, 1)">+</div>
                        </div>
                    `;
                    container.appendChild(el);
                });

                document.getElementById('cart-total').innerText = "Rp " + total.toLocaleString('id-ID');
                document.getElementById('cart-total').dataset.raw = total;
                document.getElementById('cart-count-mini').innerText = count + " Item";
            },

            changeQty: function(idx, delta) {
                const item = this.data.cart[idx];
                const prod = this.data.products.find(p => p.id === item.id);

                if(delta > 0) {
                    if(item.qty < prod.stock) item.qty++;
                    else this.showToast("Stok max", "error");
                } else {
                    item.qty--;
                    if(item.qty <= 0) this.data.cart.splice(idx, 1);
                }
                this.renderCart();
            },

            toggleCartDetail: function() {
                const container = document.querySelector('.cart-items-container');
                const icon = document.getElementById('cart-chevron');
                if(container.style.display === 'none') {
                    container.style.display = 'block';
                    icon.className = 'fas fa-chevron-up';
                } else {
                    container.style.display = 'none';
                    icon.className = 'fas fa-chevron-down';
                }
            },

            // --- CHECKOUT ---
            openCheckoutModal: function() {
                if(this.data.cart.length === 0) return this.showToast("Keranjang kosong");
                
                const total = document.getElementById('cart-total').dataset.raw;
                document.getElementById('checkout-total-display').innerText = "Rp " + parseInt(total).toLocaleString('id-ID');
                document.getElementById('pay-input').value = "";
                document.getElementById('change-display').innerText = "Rp 0";
                
                document.getElementById('modal-checkout').classList.add('open');
            },

            calcChange: function() {
                const total = parseFloat(document.getElementById('cart-total').dataset.raw || 0);
                const pay = parseFloat(document.getElementById('pay-input').value || 0);
                const change = pay - total;
                const display = document.getElementById('change-display');
                
                display.innerText = "Rp " + (change >= 0 ? change.toLocaleString('id-ID') : "Kurang");
                display.style.color = change >= 0 ? "var(--success)" : "var(--danger)";
            },

            processCheckout: function() {
                const total = parseFloat(document.getElementById('cart-total').dataset.raw || 0);
                const pay = parseFloat(document.getElementById('pay-input').value || 0);

                if(pay < total) return this.showToast("Uang kurang!", "error");

                // Prepare Receipt
                const rArea = document.getElementById('receipt-print-area');
                rArea.innerHTML = `
                    <center><b>${this.data.settings.store}</b></center>
                    <center>${new Date().toLocaleString()}</center>
                    --------------------------------<br>
                    ${this.data.cart.map(c => `${c.name}<br>${c.qty} x ${c.price} = ${c.qty*c.price}<br>`).join('')}
                    --------------------------------<br>
                    Total : ${total}<br>
                    Tunai : ${pay}<br>
                    Kembali : ${pay-total}
                `;

                // Reduce Stock
                this.data.cart.forEach(c => {
                    const idx = this.data.products.findIndex(p => p.id === c.id);
                    if(idx >= 0) this.data.products[idx].stock -= c.qty;
                });

                this.saveData();
                this.renderProducts();
                this.data.cart = [];
                this.renderCart();
                this.closeModal('modal-checkout');

                setTimeout(() => window.print(), 500);
                this.showToast("Transaksi Berhasil");
            },

            // --- STOCK ---
            renderInventory: function() {
                const container = document.getElementById('inventory-list');
                container.innerHTML = "";
                this.data.products.forEach(p => {
                    const el = document.createElement('div');
                    el.className = 'inv-card';
                    el.onclick = () => {
                        document.getElementById('p-id').value = p.id;
                        document.getElementById('p-name').value = p.name;
                        document.getElementById('p-price').value = p.price;
                        document.getElementById('p-stock').value = p.stock;
                        document.getElementById('p-barcode').value = p.barcode || "";
                        document.getElementById('btn-delete').style.display = 'block';
                        document.getElementById('modal-product').classList.add('open');
                    };
                    el.innerHTML = `
                        <div>
                            <div style="font-weight:600;">${p.name}</div>
                            <div style="font-size:0.8rem; color:#888;">Rp ${p.price.toLocaleString()} | Stok: ${p.stock}</div>
                        </div>
                        <i class="fas fa-edit" style="color:var(--primary);"></i>
                    `;
                    container.appendChild(el);
                });
            },

            openProductModal: function() {
                document.querySelector('form').reset();
                document.getElementById('p-id').value = "";
                document.getElementById('btn-delete').style.display = "none";
                document.getElementById('modal-product').classList.add('open');
            },

            saveProduct: function() {
                const id = document.getElementById('p-id').value;
                const newItem = {
                    id: id ? parseInt(id) : Date.now(),
                    name: document.getElementById('p-name').value,
                    price: parseInt(document.getElementById('p-price').value),
                    stock: parseInt(document.getElementById('p-stock').value),
                    barcode: document.getElementById('p-barcode').value
                };

                if(id) {
                    const idx = this.data.products.findIndex(p => p.id == id);
                    this.data.products[idx] = newItem;
                } else {
                    this.data.products.push(newItem);
                }
                this.saveData();
                this.renderProducts();
                this.closeModal('modal-product');
                this.showToast("Tersimpan");
            },

            deleteProduct: function() {
                if(confirm("Hapus?")) {
                    const id = document.getElementById('p-id').value;
                    this.data.products = this.data.products.filter(p => p.id != id);
                    this.saveData();
                    this.renderProducts();
                    this.closeModal('modal-product');
                    this.showToast("Dihapus");
                }
            },

            // --- SCANNER ---
            openScanner: function() {
                this.scanMode = 'cart';
                document.getElementById('modal-scanner').classList.add('open');
                this.startScanLogic();
            },

            openScannerForForm: function() {
                this.scanMode = 'form';
                document.getElementById('modal-product').classList.remove('open');
                document.getElementById('modal-scanner').classList.add('open');
                this.startScanLogic();
            },

            startScanLogic: function() {
                const el = document.getElementById('scanner-container');
                el.innerHTML = "";
                this.scanner = new Html5Qrcode("scanner-container");
                this.scanner.start(
                    {facingMode: "environment"}, 
                    {fps: 10, qrbox: {width: 250, height: 150}}, 
                    (code) => {
                        if(navigator.vibrate) navigator.vibrate(200);
                        this.closeScanner();
                        if(this.scanMode === 'cart') {
                            const p = this.data.products.find(x => x.barcode === code);
                            if(p) this.addToCart(p.id);
                            else this.showToast("Barcode tidak ditemukan", "error");
                        } else {
                            document.getElementById('p-barcode').value = code;
                            document.getElementById('modal-product').classList.add('open');
                        }
                    }, 
                    () => {}
                ).catch(e => el.innerHTML = "<p style='color:white;text-align:center;'>Error Kamera</p>");
            },

            closeScanner: function() {
                document.getElementById('modal-scanner').classList.remove('open');
                if(this.scanner) this.scanner.stop().catch(()=>{});
            },

            // --- UTILS ---
            closeModal: function(id) { document.getElementById(id).classList.remove('open'); },
            
            saveSettings: function() {
                this.data.settings.store = document.getElementById('set-store').value;
                this.saveData();
                this.showToast("Pengaturan disimpan");
            },

            saveData: function() {
                localStorage.setItem('kasir_satulayar_data', JSON.stringify(this.data));
            },

            loadData: function() {
                const saved = localStorage.getItem('kasir_satulayar_data');
                if(saved) this.data = JSON.parse(saved);
                else {
                    this.data.products = [
                        {id:1, name:"Kopi Susu", price:15000, stock:20, barcode:"123"},
                        {id:2, name:"Roti Bakar", price:12000, stock:15, barcode:"456"}
                    ];
                    this.saveData();
                }
            },

            resetData: function() {
                if(confirm("Reset semua data?")) {
                    localStorage.removeItem('kasir_satulayar_data');
                    location.reload();
                }
            },

            showToast: function(msg, type="success") {
                const t = document.getElementById('toast');
                t.innerText = msg;
                t.style.background = type === "error" ? "var(--danger)" : "#333";
                t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), 2000);
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
