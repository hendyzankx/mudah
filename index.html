<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Ultimate Pro + Inventaris</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-tab { border-bottom: 4px solid #2563eb; color: #2563eb; }
        .animate-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 pb-24">

    <!-- HEADER -->
    <header class="bg-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black text-blue-600">SMART POS V3</h1>
            <p id="date-now" class="text-[10px] text-slate-400 font-bold uppercase"></p>
        </div>
        <div class="flex gap-2">
            <button onclick="openAddProduct()" class="bg-green-500 text-white p-3 rounded-2xl shadow-lg active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
            </button>
            <button onclick="toggleScanner('pos')" class="bg-blue-600 text-white p-3 rounded-2xl shadow-lg active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" /></svg>
            </button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="p-4">
        <!-- SCANNER VIEW -->
        <div id="scanner-wrapper" class="hidden mb-4 overflow-hidden rounded-3xl shadow-inner bg-black">
            <div id="reader"></div>
        </div>

        <!-- TAB KASIR -->
        <div id="tab-kasir" class="tab-content active">
            <input type="text" id="search-box" onkeyup="renderProducts()" placeholder="Cari produk..." class="w-full p-4 rounded-2xl border-none shadow-sm mb-4 outline-none focus:ring-2 focus:ring-blue-500">
            <div class="grid grid-cols-2 gap-3" id="product-grid"></div>
        </div>

        <!-- TAB LAPORAN -->
        <div id="tab-laporan" class="tab-content">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-blue-600 p-4 rounded-3xl text-white shadow-lg">
                    <p class="text-[10px] font-bold opacity-80 uppercase">Omzet Harian</p>
                    <h2 id="stat-omzet" class="text-lg font-black">Rp 0</h2>
                </div>
                <div class="bg-green-500 p-4 rounded-3xl text-white shadow-lg">
                    <p class="text-[10px] font-bold opacity-80 uppercase">Profit Estimasi</p>
                    <h2 id="stat-profit" class="text-lg font-black">Rp 0</h2>
                </div>
            </div>
            <div class="bg-white p-4 rounded-3xl shadow-sm mb-4"><canvas id="salesChart"></canvas></div>
            <div id="history-list" class="space-y-3"></div>
        </div>

        <!-- TAB STOK / MASTER BARANG -->
        <div id="tab-stok" class="tab-content">
            <h2 class="font-black mb-4 text-xl italic text-slate-400">Master Data Produk</h2>
            <div id="stock-list" class="space-y-3"></div>
        </div>
    </main>

    <!-- MODAL TAMBAH BARANG -->
    <div id="modal-barang" class="fixed inset-0 bg-black/60 z-[70] hidden flex items-center p-4">
        <div class="bg-white w-full rounded-[2.5rem] p-6 max-h-[90vh] overflow-y-auto animate-up">
            <h2 class="text-xl font-black mb-4">Tambah/Edit Barang</h2>
            <div class="space-y-4">
                <div class="flex gap-2">
                    <input type="text" id="f-barcode" placeholder="Barcode" class="flex-1 p-3 bg-slate-100 rounded-xl outline-none border-none font-mono text-sm">
                    <button onclick="toggleScanner('form')" class="bg-blue-100 text-blue-600 p-3 rounded-xl font-bold">📷 Scan</button>
                </div>
                <input type="text" id="f-nama" placeholder="Nama Barang" class="w-full p-3 bg-slate-100 rounded-xl outline-none border-none">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 ml-1">HARGA MODAL</label>
                        <input type="number" id="f-modal" placeholder="Contoh: 3000" class="w-full p-3 bg-slate-100 rounded-xl outline-none border-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 ml-1">STOK AWAL</label>
                        <input type="number" id="f-stok" placeholder="Contoh: 100" class="w-full p-3 bg-slate-100 rounded-xl outline-none border-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[10px] font-bold text-blue-600 ml-1">HARGA JUAL PCS</label>
                        <input type="number" id="f-jual-pcs" placeholder="3500" class="w-full p-3 bg-blue-50 rounded-xl outline-none border-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-amber-600 ml-1">HARGA JUAL DUS</label>
                        <input type="number" id="f-jual-dus" placeholder="125000" class="w-full p-3 bg-amber-50 rounded-xl outline-none border-none">
                    </div>
                </div>
                <input type="number" id="f-isi" placeholder="Isi per Dus (Contoh: 40)" class="w-full p-3 bg-slate-100 rounded-xl outline-none border-none">
                
                <div class="grid grid-cols-2 gap-3 pt-4">
                    <button onclick="closeAddProduct()" class="w-full py-4 font-bold text-slate-400">BATAL</button>
                    <button onclick="saveProduct()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-200">SIMPAN BARANG</button>
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER NAV -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2 z-50">
        <button onclick="switchTab('kasir')" class="nav-btn active-tab flex-1 py-2 flex flex-col items-center font-bold text-[10px]">KASIR</button>
        <button onclick="switchTab('laporan')" class="nav-btn flex-1 py-2 flex flex-col items-center font-bold text-[10px] text-slate-400">LAPORAN</button>
        <button onclick="switchTab('stok')" class="nav-btn flex-1 py-2 flex flex-col items-center font-bold text-[10px] text-slate-400">BARANG</button>
    </nav>

    <!-- FLOATING CART -->
    <div id="floating-cart" class="fixed bottom-24 left-4 right-4 z-40 hidden">
        <button onclick="openCart()" class="w-full bg-green-500 text-white p-4 rounded-2xl font-bold shadow-2xl flex justify-between items-center">
            <span id="cart-count">0 Item</span>
            <span id="cart-preview-total">Rp 0</span>
        </button>
    </div>

    <!-- MODAL KERANJANG -->
    <div id="cart-sheet" class="fixed inset-0 bg-black/40 z-[60] hidden flex items-end">
        <div class="bg-white w-full rounded-t-[2.5rem] p-6 animate-up max-h-[85vh] overflow-y-auto">
            <div class="w-12 h-1.5 bg-slate-200 mx-auto mb-6 rounded-full"></div>
            <div id="cart-items" class="space-y-4 mb-6"></div>
            <div class="border-t border-dashed py-4 mb-6 font-black text-2xl flex justify-between">
                <span>TOTAL</span>
                <span id="total-val">Rp 0</span>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="closeCart()" class="py-4 font-bold text-slate-400">KEMBALI</button>
                <button onclick="processPayment()" class="bg-blue-600 text-white py-4 rounded-2xl font-black">PROSES BAYAR</button>
            </div>
        </div>
    </div>

    <script>
        // --- DATABASE & STATE ---
        let products = JSON.parse(localStorage.getItem('pos_products')) || [
            { id: 1, name: 'Mie Instan Goreng', modal: 2800, pricePcs: 3500, priceDus: 125000, content: 40, barcode: '8998866200578', stock: 100 }
        ];
        let cart = [];
        let history = JSON.parse(localStorage.getItem('pos_history')) || [];
        let scanner;

        function init() {
            document.getElementById('date-now').innerText = new Date().toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long' });
            renderProducts();
            calculateDailyStats();
        }

        // --- MANAJEMEN PRODUK ---
        function openAddProduct() { document.getElementById('modal-barang').classList.remove('hidden'); }
        function closeAddProduct() { document.getElementById('modal-barang').classList.add('hidden'); stopScanner(); }

        function saveProduct() {
            const newProd = {
                id: Date.now(),
                name: document.getElementById('f-nama').value,
                barcode: document.getElementById('f-barcode').value,
                modal: Number(document.getElementById('f-modal').value),
                pricePcs: Number(document.getElementById('f-jual-pcs').value),
                priceDus: Number(document.getElementById('f-jual-dus').value),
                content: Number(document.getElementById('f-isi').value),
                stock: Number(document.getElementById('f-stok').value)
            };

            if(!newProd.name || !newProd.barcode) return alert("Nama dan Barcode wajib diisi!");
            
            // Cek jika barcode sudah ada, maka update
            const index = products.findIndex(p => p.barcode === newProd.barcode);
            if(index !== -1) products[index] = newProd;
            else products.push(newProd);

            localStorage.setItem('pos_products', JSON.stringify(products));
            renderProducts();
            closeAddProduct();
            alert("Barang Berhasil Disimpan!");
        }

        // --- SCANNER (MODE: POS atau FORM) ---
        function toggleScanner(mode) {
            const wrapper = document.getElementById('scanner-wrapper');
            if(wrapper.classList.contains('hidden')) {
                wrapper.classList.remove('hidden');
                scanner = new Html5Qrcode("reader");
                scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
                    if(mode === 'pos') {
                        const prod = products.find(p => p.barcode === text);
                        if(prod) { addToCart(prod.id, 'pcs'); vibrate(); }
                    } else {
                        document.getElementById('f-barcode').value = text;
                        vibrate();
                        stopScanner();
                        // Otomatis isi form jika barcode sudah terdaftar
                        const prod = products.find(p => p.barcode === text);
                        if(prod) {
                            document.getElementById('f-nama').value = prod.name;
                            document.getElementById('f-modal').value = prod.modal;
                            document.getElementById('f-jual-pcs').value = prod.pricePcs;
                            document.getElementById('f-jual-dus').value = prod.priceDus;
                            document.getElementById('f-isi').value = prod.content;
                            document.getElementById('f-stok').value = prod.stock;
                        }
                    }
                });
            } else {
                stopScanner();
            }
        }

        function stopScanner() {
            if(scanner) scanner.stop().then(() => {
                document.getElementById('scanner-wrapper').classList.add('hidden');
            }).catch(() => document.getElementById('scanner-wrapper').classList.add('hidden'));
        }

        // --- KASIR & KERANJANG ---
        function renderProducts() {
            const q = document.getElementById('search-box').value.toLowerCase();
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.filter(p => p.name.toLowerCase().includes(q)).map(p => `
                <div class="bg-white p-4 rounded-[2rem] shadow-sm border border-transparent active:border-blue-500 transition-all">
                    <h3 class="font-bold text-sm mb-3 h-8 overflow-hidden">${p.name}</h3>
                    <div class="space-y-2">
                        <button onclick="addToCart(${p.id}, 'pcs')" class="w-full py-3 bg-blue-50 text-blue-600 rounded-xl text-[10px] font-black">PCS: Rp ${p.pricePcs.toLocaleString()}</button>
                        <button onclick="addToCart(${p.id}, 'dus')" class="w-full py-3 bg-amber-50 text-amber-600 rounded-xl text-[10px] font-black">DUS: Rp ${p.priceDus.toLocaleString()}</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id, type) {
            const p = products.find(p => p.id === id);
            const key = `${id}-${type}`;
            const inCart = cart.find(i => i.key === key);
            if(inCart) inCart.qty++; else cart.push({...p, key, type, sell: type === 'pcs' ? p.pricePcs : p.priceDus, qty: 1});
            updateCartUI();
        }

        function updateCartUI() {
            const total = cart.reduce((s, i) => s + (i.sell * i.qty), 0);
            document.getElementById('cart-count').innerText = `${cart.reduce((s,i)=>s+i.qty,0)} Item`;
            document.getElementById('cart-preview-total').innerText = `Rp ${total.toLocaleString()}`;
            document.getElementById('total-val').innerText = `Rp ${total.toLocaleString()}`;
            document.getElementById('floating-cart').style.display = cart.length > 0 ? 'block' : 'none';
            
            document.getElementById('cart-items').innerHTML = cart.map(i => `
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl">
                    <div>
                        <p class="font-bold text-sm">${i.name} (${i.type.toUpperCase()})</p>
                        <p class="text-xs text-blue-600 font-bold">Rp ${i.sell.toLocaleString()}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <button onclick="changeQty('${i.key}', -1)" class="w-8 h-8 bg-white shadow rounded-full">-</button>
                        <span class="font-bold">${i.qty}</span>
                        <button onclick="changeQty('${i.key}', 1)" class="w-8 h-8 bg-white shadow rounded-full">+</button>
                    </div>
                </div>
            `).join('');
        }

        function changeQty(key, delta) {
            const i = cart.find(x => x.key === key);
            if(i) { i.qty += delta; if(i.qty <= 0) cart = cart.filter(x => x.key !== key); }
            updateCartUI();
        }

        function processPayment() {
            if(cart.length === 0) return;
            const total = cart.reduce((s,i) => s + (i.sell * i.qty), 0);
            const modalTotal = cart.reduce((s,i) => {
                const modal = i.type === 'pcs' ? i.modal : (i.modal * i.content);
                return s + (modal * i.qty);
            }, 0);

            const trx = { id: Date.now(), total, profit: total - modalTotal, items: [...cart], date: new Date().toISOString() };
            history.unshift(trx);
            localStorage.setItem('pos_history', JSON.stringify(history));

            // Potong Stok
            cart.forEach(item => {
                const p = products.find(x => x.id === item.id);
                const dec = item.type === 'pcs' ? item.qty : (item.qty * item.content);
                p.stock -= dec;
            });
            localStorage.setItem('pos_products', JSON.stringify(products));

            alert("Pembayaran Berhasil!");
            cart = []; updateCartUI(); closeCart(); calculateDailyStats();
        }

        // --- UTILITAS ---
        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.add('text-slate-400'));
            document.getElementById('tab-'+t).classList.add('active');
            event.currentTarget.classList.remove('text-slate-400');
            if(t === 'laporan') { renderHistory(); updateChart(); calculateDailyStats(); }
            if(t === 'stok') renderStock();
        }

        function calculateDailyStats() {
            const today = new Date().toISOString().split('T')[0];
            const todayTrx = history.filter(h => h.date.startsWith(today));
            const omzet = todayTrx.reduce((s,i)=>s+i.total, 0);
            const profit = todayTrx.reduce((s,i)=>s+i.profit, 0);
            document.getElementById('stat-omzet').innerText = `Rp ${omzet.toLocaleString()}`;
            document.getElementById('stat-profit').innerText = `Rp ${profit.toLocaleString()}`;
        }

        function renderStock() {
            document.getElementById('stock-list').innerHTML = products.map(p => `
                <div class="bg-white p-4 rounded-3xl flex justify-between items-center shadow-sm">
                    <div class="flex-1">
                        <p class="font-black text-sm">${p.name}</p>
                        <p class="text-[10px] text-slate-400 font-mono">MDL: ${p.modal.toLocaleString()} | BAR: ${p.barcode}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-bold ${p.stock < 10 ? 'text-red-500' : 'text-green-500'}">STOK: ${p.stock}</p>
                        <button onclick="editProduct(${p.id})" class="text-blue-600 text-[10px] font-black underline">EDIT</button>
                    </div>
                </div>
            `).join('');
        }

        function editProduct(id) {
            const p = products.find(x => x.id === id);
            if(p) {
                document.getElementById('f-nama').value = p.name;
                document.getElementById('f-barcode').value = p.barcode;
                document.getElementById('f-modal').value = p.modal;
                document.getElementById('f-jual-pcs').value = p.pricePcs;
                document.getElementById('f-jual-dus').value = p.priceDus;
                document.getElementById('f-isi').value = p.content;
                document.getElementById('f-stok').value = p.stock;
                openAddProduct();
            }
        }

        function openCart() { document.getElementById('cart-sheet').classList.remove('hidden'); }
        function closeCart() { document.getElementById('cart-sheet').classList.add('hidden'); }
        function vibrate() { if(navigator.vibrate) navigator.vibrate(100); }

        init();
    </script>
</body>
</html>
