<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasir Modern Pro v2 (Print Fix)</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --primary-light: #4895ef;
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --text-main: #2b2d42;
            --text-muted: #8d99ae;
            --border-color: #e9ecef;
            --input-bg: #f8f9fa;
            --danger: #ef233c;
            --success: #2ec4b6;
            --shadow-card: 0 4px 12px rgba(0,0,0,0.05);
            --radius-main: 16px;
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --border-color: #333333;
            --input-bg: #2d2d2d;
            --primary: #5a73f7;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- HEADER & TOP NAV --- */
        header {
            background: var(--bg-card);
            padding: 15px 20px 0 20px;
            box-shadow: var(--shadow-card);
            z-index: 50;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        .header-brand {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .app-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary);
            margin: 0;
        }

        .clock-badge {
            font-size: 0.75rem;
            background: var(--input-bg);
            padding: 5px 10px;
            border-radius: 12px;
            color: var(--text-muted);
        }

        .top-nav-bar {
            display: flex;
            justify-content: space-between;
            padding-bottom: 5px;
            overflow-x: auto;
        }
        .top-nav-bar::-webkit-scrollbar { display: none; }

        .nav-item-top {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.7rem;
            background: none;
            border: none;
            padding: 8px 10px;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 3px solid transparent;
            min-width: 60px;
            flex: 1;
        }

        .nav-item-top i { font-size: 1.1rem; margin-bottom: 4px; }
        .nav-item-top.active { color: var(--primary); border-bottom-color: var(--primary); }
        .nav-badge-top {
            position: absolute;
            top: -5px; right: -5px;
            background: var(--danger);
            color: white;
            font-size: 0.55rem;
            padding: 2px 5px;
            border-radius: 10px;
            border: 1px solid var(--bg-card);
        }
        .badge-wrapper { position: relative; }

        /* --- CONTROLS --- */
        .controls-area {
            background: var(--bg-body);
            padding: 15px 20px 5px 20px;
            flex-shrink: 0;
        }
        
        .category-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        .cat-tab {
            padding: 6px 14px;
            background: var(--bg-card);
            border-radius: 20px;
            font-size: 0.8rem;
            white-space: nowrap;
            color: var(--text-muted);
            cursor: pointer;
            border: 1px solid var(--border-color);
        }
        .cat-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .search-wrapper { position: relative; display: none; }
        .search-input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: none;
            background: var(--bg-card);
            border-radius: 50px;
            font-size: 0.9rem;
            color: var(--text-main);
            box-shadow: var(--shadow-card);
        }
        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        /* --- MAIN CONTENT --- */
        main {
            flex: 1;
            overflow-y: auto;
            position: relative;
            padding: 20px;
            padding-bottom: 320px; 
            display: none;
            animation: fadeIn 0.3s;
        }

        main.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- PRODUCTS --- */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .product-card {
            background: var(--bg-card);
            border-radius: var(--radius-main);
            padding: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-card);
            cursor: pointer;
            border: 1px solid var(--border-color);
        }
        .product-card:active { transform: scale(0.98); }
        .p-icon {
            width: 40px; height: 40px;
            background: rgba(67, 97, 238, 0.1);
            color: var(--primary);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; margin-bottom: 10px;
        }
        .p-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 5px; }
        .p-price { color: var(--primary); font-weight: 700; font-size: 1.1rem; margin-top: auto; }
        .p-stock { font-size: 0.75rem; color: var(--text-muted); margin-top: 5px; }

        /* --- CART & CHECKOUT --- */
        .cart-list { padding-bottom: 20px; }
        .cart-item {
            background: var(--bg-card);
            border-radius: var(--radius-main);
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-color);
        }
        .ci-left { flex: 1; }
        .ci-title { font-weight: 700; font-size: 1rem; }
        .ci-price { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }
        .ci-controls {
            display: flex; align-items: center;
            background: var(--input-bg); padding: 4px; border-radius: 30px;
        }
        .btn-ci {
            width: 32px; height: 32px;
            border-radius: 50%; border: none;
            background: var(--bg-card); color: var(--text-main);
            font-weight: bold; display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .btn-ci:active { background: var(--primary); color: white; }
        .ci-count { width: 35px; text-align: center; font-weight: 700; }

        .checkout-panel {
            background: var(--bg-card);
            padding: 20px;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 40;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .row-total { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .total-label { color: var(--text-muted); font-size: 0.9rem; }
        .total-value { color: var(--text-main); font-size: 1.6rem; font-weight: 800; }
        
        .input-group { margin-bottom: 15px; position: relative; }
        .input-group input {
            width: 100%; padding: 15px; border: 2px solid var(--border-color);
            background: var(--input-bg); border-radius: 12px; font-size: 1rem;
            color: var(--text-main);
        }
        .input-group input:focus { border-color: var(--primary); }

        .money-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .btn-money {
            padding: 10px; background: var(--input-bg); border: 1px solid var(--border-color);
            border-radius: 10px; font-size: 0.8rem; color: var(--text-main); cursor: pointer;
        }
        .btn-money:active { background: var(--primary-light); color: white; }

        .btn-checkout {
            width: 100%; padding: 16px; background: var(--primary); color: white;
            border: none; border-radius: 12px; font-size: 1rem; font-weight: 700;
            cursor: pointer; box-shadow: 0 4px 15px rgba(67, 97, 238, 0.4);
        }
        .btn-checkout:active { transform: scale(0.98); }

        /* --- OTHER PAGES --- */
        .history-card, .inv-card, .setting-item {
            background: var(--bg-card); padding: 15px; border-radius: var(--radius-main);
            margin-bottom: 12px; border: 1px solid var(--border-color);
        }
        .inv-card { display: flex; justify-content: space-between; border-left: 5px solid var(--primary); }
        .inv-card.low-stock { border-left-color: var(--danger); }
        .btn-small {
            flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 0.85rem;
            display: flex; align-items: center; justify-content: center; gap: 5px; cursor: pointer;
        }
        .btn-add {
            position: fixed; bottom: 90px; right: 20px; width: 56px; height: 56px;
            background: var(--primary); color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.4); border: none; z-index: 30;
        }
        .fab-scan {
            position: fixed; bottom: 90px; right: 20px; width: 56px; height: 56px;
            background: var(--text-main); color: var(--bg-card); border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: none; z-index: 30;
        }

        /* --- MODAL --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(3px);
            z-index: 100; display: flex; align-items: flex-end;
            opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal.open { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--bg-card); width: 100%;
            border-top-left-radius: 25px; border-top-right-radius: 25px;
            padding: 25px; transform: translateY(100%); transition: 0.3s;
            max-height: 85vh; overflow-y: auto;
        }
        .modal.open .modal-content { transform: translateY(0); }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; }
        .form-input, .form-select {
            width: 100%; padding: 12px; border: none; background: var(--input-bg);
            border-radius: 10px; color: var(--text-main);
        }

        /* --- PRINT AREA FIX --- */
        #receipt-print-area { 
            display: none; /* Hidden on screen */
            background-color: white; /* Ensure white background for print */
            padding: 20px;
            font-family: 'Courier New', monospace; 
            color: #000;
        }

        @media print {
            /* Sembunyikan SEMUA elemen body secara default */
            body * {
                visibility: hidden !important;
                display: none !important;
                height: 0 !important;
                overflow: hidden !important;
            }

            /* Tampilkan area struk */
            #receipt-print-area, #receipt-print-area * { 
                visibility: visible !important; 
                display: block !important;
                height: auto !important;
                overflow: visible !important;
            }

            /* Posisi struk di kertas */
            #receipt-print-area {
                position: fixed;
                left: 0;
                top: 0;
                width: 100%;
                margin: 0;
                padding: 20px;
                background-color: white !important;
                color: black !important;
                font-size: 14px; /* Font size diperbesar agar jelas di PDF */
                z-index: 9999 !important;
            }

            /* Pastikan teks struk terbaca jelas */
            #print-store-name { font-size: 18px; font-weight: bold; margin-bottom: 10px; text-align: center; }
            #print-store-addr { text-align: center; font-size: 12px; margin-bottom: 10px; }
            #print-items div { margin-bottom: 5px; }
            
            .no-print { display: none !important; }
        }

        /* --- TOAST --- */
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-50px);
            background: #333; color: white; padding: 12px 24px; border-radius: 30px;
            font-size: 0.9rem; z-index: 200; opacity: 0; transition: 0.4s;
            display: flex; align-items: center; gap: 10px;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="no-print">
        <div class="header-brand">
            <h1 class="app-title">Kasir<span style="color:var(--text-main)">Pro</span></h1>
            <div class="clock-badge" id="clock">00:00</div>
        </div>

        <nav class="top-nav-bar no-print">
            <button class="nav-item-top active" onclick="app.nav('pos')">
                <i class="fas fa-th-large"></i><span>Produk</span>
            </button>
            <button class="nav-item-top" onclick="app.nav('cart')">
                <div class="badge-wrapper">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-badge" class="nav-badge-top" style="display:none;">0</span>
                </div>
                <span>Keranjang</span>
            </button>
            <button class="nav-item-top" onclick="app.nav('history')">
                <i class="fas fa-history"></i><span>Riwayat</span>
            </button>
            <button class="nav-item-top" onclick="app.nav('stock')">
                <i class="fas fa-boxes"></i><span>Stok</span>
            </button>
            <button class="nav-item-top" onclick="app.nav('settings')">
                <i class="fas fa-cog"></i><span>Setelan</span>
            </button>
        </nav>
    </header>

    <!-- CONTROLS -->
    <div id="pos-controls" class="controls-area no-print">
        <div class="category-tabs">
            <div class="cat-tab active" onclick="app.filterCat('all', this)">Semua</div>
            <div class="cat-tab" onclick="app.filterCat('makanan', this)">Makanan</div>
            <div class="cat-tab" onclick="app.filterCat('minuman', this)">Minuman</div>
            <div class="cat-tab" onclick="app.filterCat('snack', this)">Snack</div>
        </div>
        <div class="search-wrapper" id="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-input" placeholder="Cari barang..." onkeyup="app.filterPos()">
        </div>
    </div>

    <!-- 1. POS PAGE -->
    <main id="page-pos" class="active">
        <div id="product-list" class="product-grid"></div>
        <button class="fab-scan no-print" onclick="app.openScanner()"><i class="fas fa-barcode"></i></button>
    </main>

    <!-- 2. CART PAGE -->
    <main id="page-cart">
        <div class="cart-list" id="cart-list"></div>
        
        <!-- CHECKOUT PANEL -->
        <div class="checkout-panel no-print">
            <div class="row-total">
                <span class="total-label">Total</span>
                <span class="total-value" id="cart-total">Rp 0</span>
            </div>
            
            <div class="money-grid">
                <button class="btn-money" onclick="app.setMoney(10000)">10rb</button>
                <button class="btn-money" onclick="app.setMoney(20000)">20rb</button>
                <button class="btn-money" onclick="app.setMoney(50000)">50rb</button>
                <button class="btn-money" onclick="app.setMoney(100000)">100rb</button>
                <button class="btn-money" onclick="app.setMoney('uang_pas')">Uang Pas</button>
                <button class="btn-money" style="color:var(--danger)" onclick="app.clearMoney()"><i class="fas fa-times"></i></button>
            </div>

            <div class="input-group">
                <input type="number" id="pay-input" placeholder="Masukkan Uang Tunai (Rp)" onkeyup="app.calcChange()">
            </div>
            
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-size:0.9rem;">
                <span>Kembalian</span>
                <span id="change-display" style="color:var(--success); font-weight:700;">Rp 0</span>
            </div>

            <button class="btn-checkout" onclick="app.checkout()">
                Bayar Sekarang <i class="fas fa-arrow-right" style="margin-left:10px;"></i>
            </button>
        </div>
    </main>

    <!-- 3. STOCK PAGE -->
    <main id="page-stock">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0;">Inventaris</h2>
            <button class="btn-small" onclick="app.exportToCSV()" style="background:var(--success); color:white;">Ekspor CSV</button>
        </div>
        <div id="inventory-list"></div>
        <button class="btn-add no-print" onclick="app.openProductModal()"><i class="fas fa-plus"></i></button>
    </main>

    <!-- 4. HISTORY PAGE -->
    <main id="page-history">
        <div style="margin-bottom: 20px;">
            <h2 style="margin:0;">Riwayat</h2>
            <small style="color:var(--text-muted)">50 transaksi terakhir</small>
        </div>
        <div id="history-list"></div>
    </main>

    <!-- 5. SETTINGS PAGE -->
    <main id="page-settings">
        <div class="setting-item">
            <div>
                <h3 style="margin:0;">Dark Mode</h3>
                <small style="color:var(--text-muted)">Tema Gelap</small>
            </div>
            <label class="switch">
                <input type="checkbox" id="theme-toggle" onchange="app.toggleTheme()">
                <span class="slider" style="position:relative; width:40px; height:20px; background:#ccc; border-radius:20px; transition:.4s;"></span>
            </label>
        </div>
        <div class="setting-item">
            <h3 style="margin:0;">Profil Toko</h3>
            <div class="form-group">
                <input type="text" id="set-store-name" class="form-input" placeholder="Nama Toko">
            </div>
            <div class="form-group">
                <input type="text" id="set-address" class="form-input" placeholder="Alamat">
            </div>
            <button class="btn-checkout" onclick="app.saveSettings()">Simpan</button>
        </div>
        <div class="setting-item">
            <h3 style="margin:0; color:var(--danger);">Zona Bahaya</h3>
            <button class="btn-checkout" style="background:#ffe5e5; color:var(--danger); margin-top:10px;" onclick="app.resetData()">Reset Data</button>
        </div>
    </main>

    <!-- MODAL PRODUCT -->
    <div id="modal-product" class="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h3 id="modal-title-text" style="margin:0;">Tambah Barang</h3>
                <i class="fas fa-times" onclick="app.closeModal('modal-product')" style="cursor:pointer;"></i>
            </div>
            <form id="product-form" onsubmit="event.preventDefault(); app.saveProduct();">
                <input type="hidden" id="p-id">
                <div class="form-group">
                    <label class="form-label">Nama Barang</label>
                    <input type="text" id="p-name" class="form-input" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label class="form-label">Harga</label>
                        <input type="number" id="p-price" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Kategori</label>
                        <select id="p-category" class="form-select">
                            <option value="makanan">Makanan</option>
                            <option value="minuman">Minuman</option>
                            <option value="snack">Snack</option>
                            <option value="lainnya">Lainnya</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" id="stock-mode-group">
                    <label class="form-label">Mode Stok</label>
                    <select id="p-stock-mode" class="form-select">
                        <option value="set">Set Stok Baru</option>
                        <option value="add">Tambah Stok</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Jumlah Stok</label>
                    <input type="number" id="p-stock" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Barcode</label>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="p-barcode" class="form-input" style="flex:1;">
                        <button type="button" class="btn-ci" style="width:40px; height:40px; border-radius:8px;" onclick="app.openScannerForForm()">
                            <i class="fas fa-barcode"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-checkout">Simpan</button>
                <button type="button" id="btn-delete" class="btn-checkout" style="background:var(--danger); margin-top:10px; display:none;" onclick="app.deleteProduct()">Hapus</button>
            </form>
        </div>
    </div>

    <!-- MODAL SCANNER -->
    <div id="modal-scanner" class="modal" style="align-items:center; justify-content:center;">
        <div class="modal-content" style="width:90%; max-width:400px; border-radius:20px; transform:none;">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <h3 style="margin:0;">Scan Barcode</h3>
                <i class="fas fa-times" onclick="app.closeScanner()" style="cursor:pointer;"></i>
            </div>
            <div id="scanner-container" style="min-height:250px; background:#000; border-radius:10px; overflow:hidden;"></div>
        </div>
    </div>

    <!-- RECEIPT PRINT AREA (UPDATED) -->
    <div id="receipt-print-area">
        <div id="print-store-name">TOKO MAJU JAYA</div>
        <div id="print-store-addr">Jl. Digital No. 1</div>
        <div style="border-bottom: 1px dashed black; margin: 10px 0;"></div>
        <div id="print-items"></div>
        <div style="border-bottom: 1px dashed black; margin: 10px 0;"></div>
        <div style="display:flex; justify-content:space-between; margin-top:5px;">
            <span>Total:</span>
            <span id="print-total"></span>
        </div>
        <div style="display:flex; justify-content:space-between; margin-top:5px;">
            <span>Tunai:</span>
            <span id="print-cash"></span>
        </div>
        <div style="display:flex; justify-content:space-between; margin-top:5px;">
            <span>Kembali:</span>
            <span id="print-change"></span>
        </div>
        <div style="text-align:center; margin-top:30px;">Terima Kasih</div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toast-msg">Success</span>
    </div>

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script>
        const app = {
            data: {
                products: [],
                cart: [],
                history: [],
                settings: { storeName: "Toko Maju Jaya", address: "Jl. Digital No. 1", theme: 'light' },
                scanMode: 'pos',
                currentFilter: 'all'
            },
            html5QrcodeScanner: null,

            init: function() {
                this.loadData();
                this.applyTheme();
                this.nav('pos');
                this.renderProducts();
                this.renderInventory();
                this.renderHistory();
                this.startClock();
                
                document.getElementById('set-store-name').value = this.data.settings.storeName;
                document.getElementById('set-address').value = this.data.settings.address;
                document.getElementById('theme-toggle').checked = (this.data.settings.theme === 'dark');
            },

            startClock: function() {
                setInterval(() => {
                    document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
                }, 1000);
            },

            nav: function(pageId) {
                document.querySelectorAll('main').forEach(el => el.classList.remove('active'));
                document.getElementById('page-' + pageId).classList.add('active');
                document.querySelectorAll('.nav-item-top').forEach(el => el.classList.remove('active'));
                const idx = ['pos', 'cart', 'history', 'stock', 'settings'].indexOf(pageId);
                if(idx >= 0) document.querySelectorAll('.nav-item-top')[idx].classList.add('active');

                const posControls = document.getElementById('pos-controls');
                const searchContainer = document.getElementById('search-container');
                if (pageId === 'pos') {
                    posControls.style.display = 'block';
                    searchContainer.style.display = 'block';
                } else {
                    posControls.style.display = 'none';
                    searchContainer.style.display = 'none';
                }
                if (pageId === 'cart') this.renderCart();
                if (pageId === 'stock') this.renderInventory();
                if (pageId === 'history') this.renderHistory();
            },

            toggleTheme: function() {
                this.data.settings.theme = document.getElementById('theme-toggle').checked ? 'dark' : 'light';
                this.applyTheme();
                this.saveData();
            },
            applyTheme: function() {
                document.documentElement.setAttribute('data-theme', this.data.settings.theme);
            },
            formatRupiah: function(num) {
                return 'Rp ' + parseInt(num).toLocaleString('id-ID');
            },
            showToast: function(msg, type='success') {
                const t = document.getElementById('toast');
                document.getElementById('toast-msg').innerText = msg;
                t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), 3000);
            },

            // --- POS ---
            filterCat: function(cat, el) {
                this.data.currentFilter = cat;
                document.querySelectorAll('.cat-tab').forEach(e => e.classList.remove('active'));
                el.classList.add('active');
                this.renderProducts(document.querySelector('.search-input').value);
            },
            renderProducts: function(filter="") {
                const container = document.getElementById('product-list');
                container.innerHTML = "";
                let list = this.data.products.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
                if(this.data.currentFilter !== 'all') list = list.filter(p => p.category === this.data.currentFilter);
                list.forEach(p => {
                    const el = document.createElement('div');
                    el.className = 'product-card';
                    el.onclick = () => this.addToCart(p.id);
                    el.innerHTML = `
                        <div class="p-icon"><i class="fas fa-box-open"></i></div>
                        <div class="p-name">${p.name}</div>
                        <div class="p-price">${this.formatRupiah(p.price)}</div>
                        <div class="p-stock">Stok: ${p.stock}</div>
                    `;
                    container.appendChild(el);
                });
            },
            filterPos: function() {
                this.renderProducts(document.querySelector('.search-input').value);
            },

            // --- CART ---
            addToCart: function(id) {
                const p = this.data.products.find(x => x.id === id);
                const cItem = this.data.cart.find(x => x.id === id);
                if(p.stock <= (cItem ? cItem.qty : 0)) return this.showToast("Stok habis", 'error');
                if(cItem) cItem.qty++;
                else this.data.cart.push({ id: p.id, name: p.name, price: p.price, qty: 1 });
                this.updateCartBadge();
                this.showToast("Masuk keranjang");
            },
            renderCart: function() {
                const container = document.getElementById('cart-list');
                container.innerHTML = "";
                let total = 0;
                if(this.data.cart.length === 0) {
                    container.innerHTML = `<div style="text-align:center; padding:50px; color:var(--text-muted);"><i class="fas fa-shopping-basket" style="font-size:3rem; margin-bottom:20px; opacity:0.3;"></i><p>Keranjang kosong</p></div>`;
                    document.getElementById('cart-total').innerText = "Rp 0";
                    document.getElementById('cart-total').dataset.value = 0;
                    return;
                }
                this.data.cart.forEach((item, idx) => {
                    total += item.price * item.qty;
                    const el = document.createElement('div');
                    el.className = 'cart-item';
                    el.innerHTML = `
                        <div class="ci-left">
                            <div class="ci-title">${item.name}</div>
                            <div class="ci-price">${this.formatRupiah(item.price)} x ${item.qty}</div>
                        </div>
                        <div class="ci-controls">
                            <button class="btn-ci" onclick="app.changeQty(${idx}, -1)"><i class="fas fa-minus"></i></button>
                            <div class="ci-count">${item.qty}</div>
                            <button class="btn-ci" onclick="app.changeQty(${idx}, 1)"><i class="fas fa-plus"></i></button>
                        </div>
                    `;
                    container.appendChild(el);
                });
                document.getElementById('cart-total').innerText = this.formatRupiah(total);
                document.getElementById('cart-total').dataset.value = total;
                this.calcChange();
            },
            changeQty: function(idx, delta) {
                const item = this.data.cart[idx];
                if(delta > 0) {
                    if(item.qty < this.data.products.find(p=>p.id===item.id).stock) item.qty++;
                    else this.showToast("Stok maks", 'error');
                } else {
                    item.qty--;
                    if(item.qty <= 0) this.data.cart.splice(idx, 1);
                }
                this.renderCart();
                this.updateCartBadge();
            },
            updateCartBadge: function() {
                const count = this.data.cart.reduce((a,b)=>a+b.qty, 0);
                const badge = document.getElementById('cart-badge');
                badge.innerText = count;
                badge.style.display = count > 0 ? 'block' : 'none';
            },
            setMoney: function(amount) {
                const total = parseFloat(document.getElementById('cart-total').dataset.value || 0);
                document.getElementById('pay-input').value = (amount === 'uang_pas') ? total : amount;
                this.calcChange();
            },
            clearMoney: function() {
                document.getElementById('pay-input').value = ""; 
                this.calcChange();
            },
            calcChange: function() {
                const total = parseFloat(document.getElementById('cart-total').dataset.value || 0);
                const cash = parseFloat(document.getElementById('pay-input').value || 0);
                const change = cash - total;
                const display = document.getElementById('change-display');
                if(change >= 0) {
                    display.innerText = this.formatRupiah(change);
                    display.style.color = "var(--success)";
                } else {
                    display.innerText = "Kurang " + this.formatRupiah(Math.abs(change));
                    display.style.color = "var(--danger)";
                }
            },
            checkout: function() {
                if(this.data.cart.length === 0) return;
                const total = parseFloat(document.getElementById('cart-total').dataset.value);
                const cash = parseFloat(document.getElementById('pay-input').value);
                if(cash < total) return this.showToast("Uang kurang!", 'error');
                const change = cash - total;

                // Save transaction
                const transaction = {
                    id: Date.now(),
                    date: new Date().toISOString(),
                    items: [...this.data.cart],
                    total: total,
                    cash: cash,
                    change: change
                };
                this.data.history.unshift(transaction);
                if(this.data.history.length > 50) this.data.history.pop();

                // Prepare Print Content
                document.getElementById('print-store-name').innerText = this.data.settings.storeName;
                document.getElementById('print-store-addr').innerText = this.data.settings.address;
                document.getElementById('print-items').innerHTML = transaction.items.map(c => 
                    `<div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <div>${c.name}</div>
                        <div>${c.qty} x ${c.price} = ${c.qty*c.price}</div>
                    </div>`
                ).join('');
                document.getElementById('print-total').innerText = total.toLocaleString('id-ID');
                document.getElementById('print-cash').innerText = cash.toLocaleString('id-ID');
                document.getElementById('print-change').innerText = change.toLocaleString('id-ID');

                // Reduce Stock
                this.data.cart.forEach(c => {
                    const idx = this.data.products.findIndex(p => p.id === c.id);
                    if(idx >= 0) this.data.products[idx].stock -= c.qty;
                });

                this.saveData();
                this.renderProducts();
                this.data.cart = [];
                this.updateCartBadge();
                document.getElementById('pay-input').value = "";
                this.renderCart();
                this.nav('pos');

                // Trigger Print
                setTimeout(() => window.print(), 500);
                this.showToast("Transaksi Berhasil");
            },

            // --- HISTORY ---
            renderHistory: function() {
                const container = document.getElementById('history-list');
                container.innerHTML = "";
                if(this.data.history.length === 0) {
                    container.innerHTML = `<div style="text-align:center; padding:50px; color:var(--text-muted);">Belum ada transaksi</div>`;
                    return;
                }
                this.data.history.forEach(h => {
                    const date = new Date(h.date);
                    const el = document.createElement('div');
                    el.className = 'history-card';
                    el.innerHTML = `
                        <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:var(--text-muted); margin-bottom:5px;">
                            <span>#${h.id.toString().slice(-6)}</span>
                            <span>${date.toLocaleDateString('id-ID')} ${date.getHours()}:${date.getMinutes()}</span>
                        </div>
                        <div style="font-size:1.2rem; font-weight:800; color:var(--primary); margin-bottom:10px;">${this.formatRupiah(h.total)}</div>
                        <div class="btn-small" style="background:var(--input-bg);" onclick="app.reprint(${h.id})"><i class="fas fa-print"></i> Cetak Ulang</div>
                    `;
                    container.appendChild(el);
                });
            },
            reprint: function(id) {
                const t = this.data.history.find(x => x.id === id);
                if(!t) return;
                document.getElementById('print-store-name').innerText = this.data.settings.storeName;
                document.getElementById('print-store-addr').innerText = this.data.settings.address;
                document.getElementById('print-items').innerHTML = t.items.map(c => 
                    `<div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <div>${c.name}</div>
                        <div>${c.qty} x ${c.price} = ${c.qty*c.price}</div>
                    </div>`
                ).join('');
                document.getElementById('print-total').innerText = t.total.toLocaleString('id-ID');
                document.getElementById('print-cash').innerText = t.cash.toLocaleString('id-ID');
                document.getElementById('print-change').innerText = t.change.toLocaleString('id-ID');
                window.print();
            },

            // --- STOCK ---
            renderInventory: function() {
                const container = document.getElementById('inventory-list');
                container.innerHTML = "";
                this.data.products.forEach(p => {
                    const el = document.createElement('div');
                    el.className = `inv-card ${p.stock < 5 ? 'low-stock' : ''}`;
                    el.innerHTML = `
                        <div onclick="app.editProduct(${p.id})">
                            <h3 style="margin:0;">${p.name}</h3>
                            <div style="font-size:0.8rem; color:var(--text-muted);">${this.formatRupiah(p.price)} • Stok: <b>${p.stock}</b></div>
                        </div>
                        <i class="fas fa-chevron-right" style="color:#ccc;" onclick="app.editProduct(${p.id})"></i>
                    `;
                    container.appendChild(el);
                });
            },
            openProductModal: function() {
                document.getElementById('product-form').reset();
                document.getElementById('p-id').value = "";
                document.getElementById('modal-title-text').innerText = "Tambah Barang";
                document.getElementById('btn-delete').style.display = "none";
                document.getElementById('stock-mode-group').style.display = 'none';
                document.getElementById('modal-product').classList.add('open');
            },
            editProduct: function(id) {
                const p = this.data.products.find(x => x.id === id);
                if(!p) return;
                document.getElementById('p-id').value = p.id;
                document.getElementById('p-name').value = p.name;
                document.getElementById('p-price').value = p.price;
                document.getElementById('p-category').value = p.category || 'lainnya';
                document.getElementById('p-stock').value = p.stock;
                document.getElementById('p-barcode').value = p.barcode || "";
                document.getElementById('modal-title-text').innerText = "Edit Barang";
                document.getElementById('btn-delete').style.display = "block";
                document.getElementById('stock-mode-group').style.display = 'block';
                document.getElementById('modal-product').classList.add('open');
            },
            saveProduct: function() {
                const id = document.getElementById('p-id').value;
                const name = document.getElementById('p-name').value;
                const price = parseInt(document.getElementById('p-price').value);
                const category = document.getElementById('p-category').value;
                const barcode = document.getElementById('p-barcode').value;

                if(id) {
                    const idx = this.data.products.findIndex(x => x.id == id);
                    const stockMode = document.getElementById('p-stock-mode').value;
                    let newStock = parseInt(document.getElementById('p-stock').value);
                    if(stockMode === 'add') newStock = this.data.products[idx].stock + newStock;
                    this.data.products[idx] = { ...this.data.products[idx], name, price, category, stock: newStock, barcode };
                } else {
                    const stock = parseInt(document.getElementById('p-stock').value);
                    this.data.products.push({ id: Date.now(), name, price, category, stock, barcode });
                }
                this.saveData();
                this.renderProducts();
                this.renderInventory();
                this.closeModal('modal-product');
                this.showToast("Disimpan");
            },
            deleteProduct: function() {
                if(confirm("Hapus?")) {
                    const id = document.getElementById('p-id').value;
                    this.data.products = this.data.products.filter(p => p.id != id);
                    this.saveData();
                    this.renderProducts();
                    this.renderInventory();
                    this.closeModal('modal-product');
                    this.showToast("Dihapus");
                }
            },
            exportToCSV: function() {
                let csvContent = "data:text/csv;charset=utf-8,ID,Nama,Kategori,Harga,Stok\n";
                this.data.products.forEach(p => {
                    csvContent += `${p.id},"${p.name}",${p.category},${p.price},${p.stock}\n`;
                });
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", "stok.csv");
                document.body.appendChild(link);
                link.click();
            },

            // --- SCANNER ---
            openScanner: function() {
                this.data.scanMode = 'pos';
                document.getElementById('modal-scanner').classList.add('open');
                this.startScan();
            },
            openScannerForForm: function() {
                this.data.scanMode = 'form';
                document.getElementById('modal-product').classList.remove('open'); 
                document.getElementById('modal-scanner').classList.add('open');
                this.startScan();
            },
            startScan: function() {
                const container = document.getElementById('scanner-container');
                container.innerHTML = "";
                if(!this.html5QrcodeScanner) this.html5QrcodeScanner = new Html5Qrcode("scanner-container");
                const config = { fps: 10, qrbox: { width: 250, height: 150 } };
                this.html5QrcodeScanner.start(
                    { facingMode: "environment" }, config, 
                    (code) => {
                        if(navigator.vibrate) navigator.vibrate(200);
                        this.closeScanner();
                        if(this.data.scanMode === 'pos') {
                            const p = this.data.products.find(x => x.barcode === code);
                            if(p) this.addToCart(p.id);
                            else this.showToast("Barcode tidak ada", 'error');
                        } else {
                            document.getElementById('p-barcode').value = code;
                            document.getElementById('modal-product').classList.add('open');
                        }
                    }, () => {}
                ).catch(err => {
                    container.innerHTML = `<div style="color:white; text-align:center; padding:20px;">Kamera Error</div>`;
                });
            },
            closeScanner: function() {
                document.getElementById('modal-scanner').classList.remove('open');
                if(this.html5QrcodeScanner) this.html5QrcodeScanner.stop().catch(()=>{});
            },
            closeModal: function(id) { document.getElementById(id).classList.remove('open'); },
            saveSettings: function() {
                this.data.settings.storeName = document.getElementById('set-store-name').value;
                this.data.settings.address = document.getElementById('set-address').value;
                this.saveData();
                this.showToast("Tersimpan");
            },
            loadData: function() {
                const saved = localStorage.getItem('pos_pro_fixed');
                if(saved) { this.data = JSON.parse(saved); }
                else {
                    this.data.products = [
                        { id: 1, name: "Kopi Susu Gula Aren", price: 18000, stock: 45, category: 'minuman', barcode: "8991001" },
                        { id: 2, name: "Roti Bakar Coklat", price: 15000, stock: 20, category: 'makanan', barcode: "8991002" },
                        { id: 3, name: "Teh Tarik Dingin", price: 12000, stock: 50, category: 'minuman', barcode: "" },
                        { id: 4, name: "Indomie Goreng", price: 13000, stock: 100, category: 'makanan', barcode: "8991003" }
                    ];
                    this.saveData();
                }
            },
            saveData: function() { localStorage.setItem('pos_pro_fixed', JSON.stringify(this.data)); },
            resetData: function() {
                if(confirm("Hapus semua data?")) {
                    localStorage.removeItem('pos_pro_fixed');
                    location.reload();
                }
            }
        };
        window.onload = () => app.init();
    </script>
</body>
</html>
