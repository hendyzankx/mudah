<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir Mobile Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Optimasi untuk sentuhan ponsel */
        .product-card:active { transform: scale(0.95); transition: 0.1s; }
        .cart-container { height: calc(100vh - 350px); overflow-y: auto; }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10">
        <h1 class="text-xl font-bold text-center">POS Mobile</h1>
    </header>

    <main class="p-4 mb-32">
        <!-- Pencarian -->
        <div class="mb-4">
            <input type="text" placeholder="Cari barang..." class="w-full p-3 rounded-lg border border-gray-300 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <!-- Daftar Produk (Grid 2 Kolom) -->
        <div class="grid grid-cols-2 gap-4" id="product-list">
            <!-- Produk akan muncul di sini via JS -->
        </div>
    </main>

    <!-- Panel Keranjang (Bottom Sheet) -->
    <section class="fixed bottom-0 left-0 right-0 bg-white shadow-[0_-4px_10px_rgba(0,0,0,0.1)] rounded-t-2xl p-4">
        <h2 class="font-bold text-gray-700 mb-2">Keranjang</h2>
        <div id="cart-items" class="cart-container mb-4 space-y-2">
            <p class="text-gray-400 text-sm text-center py-4">Belum ada barang.</p>
        </div>

        <div class="border-t pt-4">
            <div class="flex justify-between text-xl font-bold mb-4">
                <span>Total:</span>
                <span id="total-price" class="text-blue-600">Rp 0</span>
            </div>
            <button onclick="checkout()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl text-lg shadow-lg active:bg-green-700">
                BAYAR SEKARANG
            </button>
        </div>
    </section>

    <script>
        // Data Produk Dummy
        const products = [
            { id: 1, name: 'Kopi Susu', price: 15000, color: 'bg-amber-100' },
            { id: 2, name: 'Roti Bakar', price: 12000, color: 'bg-yellow-100' },
            { id: 3, name: 'Teh Manis', price: 5000, color: 'bg-green-100' },
            { id: 4, name: 'Nasi Goreng', price: 20000, color: 'bg-orange-100' },
        ];

        let cart = [];

        // Render Produk ke Layar
        function renderProducts() {
            const container = document.getElementById('product-list');
            container.innerHTML = products.map(p => `
                <div onclick="addToCart(${p.id})" class="product-card ${p.color} p-4 rounded-2xl shadow-sm border border-gray-200 flex flex-col items-center justify-center text-center cursor-pointer">
                    <span class="font-bold text-gray-800">${p.name}</span>
                    <span class="text-sm text-gray-600">Rp ${p.price.toLocaleString()}</span>
                </div>
            `).join('');
        }

        // Tambah ke Keranjang
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const inCart = cart.find(item => item.id === id);

            if (inCart) {
                inCart.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            updateCart();
        }

        // Update Tampilan Keranjang
        function updateCart() {
            const cartElement = document.getElementById('cart-items');
            const totalElement = document.getElementById('total-price');
            
            if (cart.length === 0) {
                cartElement.innerHTML = `<p class="text-gray-400 text-sm text-center py-4">Belum ada barang.</p>`;
                totalElement.innerText = `Rp 0`;
                return;
            }

            let total = 0;
            cartElement.innerHTML = cart.map(item => {
                total += item.price * item.qty;
                return `
                    <div class="flex justify-between items-center bg-gray-50 p-2 rounded-lg">
                        <div>
                            <div class="font-semibold text-sm">${item.name}</div>
                            <div class="text-xs text-gray-500">x${item.qty}</div>
                        </div>
                        <div class="text-sm font-bold">Rp ${(item.price * item.qty).toLocaleString()}</div>
                    </div>
                `;
            }).join('');

            totalElement.innerText = `Rp ${total.toLocaleString()}`;
        }

        function checkout() {
            if (cart.length === 0) return alert("Keranjang masih kosong!");
            alert("Transaksi Berhasil!");
            cart = [];
            updateCart();
        }

        // Inisialisasi
        renderProducts();
    </script>
</body>
</html>
