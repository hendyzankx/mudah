<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Pro - Mobile Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-tab { border-bottom: 3px solid #2563eb; color: #2563eb; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Navigasi Utama -->
    <nav class="bg-white shadow-sm flex justify-around sticky top-0 z-50 border-b">
        <button onclick="switchTab('kasir')" class="tab-btn active-tab py-4 px-6 font-bold text-sm">KASIR</button>
        <button onclick="switchTab('riwayat')" class="tab-btn py-4 px-6 font-bold text-sm">RIWAYAT</button>
        <button onclick="switchTab('stok')" class="tab-btn py-4 px-6 font-bold text-sm">STOK</button>
    </nav>

    <!-- TAB 1: KASIR -->
    <div id="kasir" class="tab-content active p-4 pb-80">
        <div class="flex gap-2 overflow-x-auto no-scrollbar mb-4">
            <button onclick="renderProducts('Semua')" class="bg-white border px-4 py-2 rounded-full text-xs font-bold shadow-sm active:bg-blue-500 active:text-white">Semua</button>
            <button onclick="renderProducts('Makanan')" class="bg-white border px-4 py-2 rounded-full text-xs font-bold shadow-sm">Makanan</button>
            <button onclick="renderProducts('Minuman')" class="bg-white border px-4 py-2 rounded-full text-xs font-bold shadow-sm">Minuman</button>
        </div>

        <div class="grid grid-cols-2 gap-3" id="pos-grid">
            <!-- Produk dirender di sini -->
        </div>
    </div>

    <!-- TAB 2: RIWAYAT -->
    <div id="riwayat" class="tab-content p-4">
        <h2 class="text-xl font-bold mb-4">Transaksi Terakhir</h2>
        <div id="history-list" class="space-y-3">
            <!-- Riwayat muncul di sini -->
        </div>
    </div>

    <!-- TAB 3: STOK -->
    <div id="stok" class="tab-content p-4">
        <h2 class="text-xl font-bold mb-4">Manajemen Inventaris</h2>
        <div id="stock-list" class="bg-white rounded-xl shadow-sm divide-y">
            <!-- Stok muncul di sini -->
        </div>
    </div>

    <!-- Floating Checkout Section -->
    <div id="cart-footer" class="fixed bottom-0 left-0 right-0 bg-white border-t rounded-t-3xl shadow-2xl z-40">
        <div class="p-6">
            <div id="cart-items-preview" class="max-h-32 overflow-y-auto mb-3 space-y-2">
                <!-- Preview belanjaan -->
            </div>
            <div class="flex justify-between items-center mb-4 border-t pt-3">
                <span class="text-gray-500 font-medium">Total Pembayaran</span>
                <span id="grand-total" class="text-2xl font-black text-blue-600">Rp 0</span>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="clearCart()" class="bg-gray-100 text-gray-600 py-4 rounded-2xl font-bold">Batal</button>
                <button onclick="checkout()" class="bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200">Proses</button>
            </div>
        </div>
    </div>

    <script>
        // Data Awal & State
        let masterProducts = [
            { id: 1, name: 'Kopi Gula Aren', price: 18000, category: 'Minuman', stock: 20 },
            { id: 2, name: 'Indomie Telur', price: 15000, category: 'Makanan', stock: 15 },
            { id: 3, name: 'Es Teh Manis', price: 5000, category: 'Minuman', stock: 50 },
            { id: 4, name: 'Pisang Goreng', price: 12000, category: 'Makanan', stock: 10 }
        ];

        let cart = [];
        let history = JSON.parse(localStorage.getItem('pos_history')) || [];

        // Inisialisasi
        function init() {
            renderProducts('Semua');
            updateCartUI();
            renderHistory();
            renderStock();
        }

        // --- Fitur Inti ---

        function renderProducts(cat) {
            const grid = document.getElementById('pos-grid');
            const data = cat === 'Semua' ? masterProducts : masterProducts.filter(p => p.category === cat);
            
            grid.innerHTML = data.map(p => `
                <div onclick="addToCart(${p.id})" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 relative ${p.stock <= 0 ? 'opacity-50 grayscale' : ''}">
                    <p class="text-[10px] font-bold text-blue-500 uppercase">${p.category}</p>
                    <h3 class="font-bold text-gray-800 text-sm mb-1">${p.name}</h3>
                    <p class="font-black text-blue-700">Rp ${p.price.toLocaleString()}</p>
                    <span class="absolute top-2 right-2 text-[9px] bg-gray-100 px-2 py-1 rounded text-gray-500">Stok: ${p.stock}</span>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = masterProducts.find(p => p.id === id);
            if(product.stock <= 0) return alert("Stok Habis!");

            const inCart = cart.find(item => item.id === id);
            if(inCart) {
                if(inCart.qty < product.stock) inCart.qty++;
                else alert("Mencapai batas stok!");
            } else {
                cart.push({...product, qty: 1});
            }
            updateCartUI();
        }

        function updateCartUI() {
            const preview = document.getElementById('cart-items-preview');
            const totalDisp = document.getElementById('grand-total');
            
            if(cart.length === 0) {
                preview.innerHTML = `<p class="text-xs text-gray-400 text-center">Keranjang kosong</p>`;
                totalDisp.innerText = "Rp 0";
                return;
            }

            let total = 0;
            preview.innerHTML = cart.map(item => {
                total += item.price * item.qty;
                return `
                    <div class="flex justify-between text-xs">
                        <span class="font-bold text-gray-700">${item.name} x${item.qty}</span>
                        <span class="font-medium">Rp ${(item.price * item.qty).toLocaleString()}</span>
                    </div>
                `;
            }).join('');
            totalDisp.innerText = `Rp ${total.toLocaleString()}`;
        }

        function checkout() {
            if(cart.length === 0) return;

            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const trx = {
                id: Date.now(),
                time: new Date().toLocaleTimeString(),
                items: [...cart],
                total: total
            };

            // Potong Stok
            cart.forEach(item => {
                const prod = masterProducts.find(p => p.id === item.id);
                prod.stock -= item.qty;
            });

            history.unshift(trx);
            localStorage.setItem('pos_history', JSON.stringify(history));
            
            alert(`💰 Pembayaran Berhasil!\nTotal: Rp ${total.toLocaleString()}`);
            
            cart = [];
            updateCartUI();
            renderProducts('Semua');
            renderHistory();
            renderStock();
        }

        // --- Navigasi & UI Tambahan ---

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active-tab');

            // Sembunyikan keranjang jika tidak di tab Kasir
            document.getElementById('cart-footer').style.display = tabId === 'kasir' ? 'block' : 'none';
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            container.innerHTML = history.map(h => `
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500">
                    <div class="flex justify-between mb-2">
                        <span class="text-xs font-bold text-gray-400">#${h.id}</span>
                        <span class="text-xs text-gray-400">${h.time}</span>
                    </div>
                    <p class="font-black text-lg">Rp ${h.total.toLocaleString()}</p>
                    <p class="text-[10px] text-gray-500 uppercase">${h.items.map(i => i.name).join(', ')}</p>
                </div>
            `).join('');
        }

        function renderStock() {
            const container = document.getElementById('stock-list');
            container.innerHTML = masterProducts.map(p => `
                <div class="p-4 flex justify-between items-center">
                    <div>
                        <p class="font-bold text-gray-800">${p.name}</p>
                        <p class="text-xs text-gray-500">Harga Jual: Rp ${p.price.toLocaleString()}</p>
                    </div>
                    <div class="text-right">
                        <span class="px-3 py-1 rounded-full text-xs font-bold ${p.stock < 5 ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">
                            Sisa: ${p.stock}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        function clearCart() {
            cart = [];
            updateCartUI();
        }

        init();
    </script>
</body>
</html>
