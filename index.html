<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Pro Ultimate - Stable Camera</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-tab { color: #2563eb; border-bottom: 3px solid #2563eb; }
        
        /* FIX: Overlay Scanner agar selalu di atas modal (z-index tertinggi) */
        #scanner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #reader {
            width: 85%;
            max-width: 400px;
            aspect-ratio: 1/1;
            border-radius: 24px;
            overflow: hidden;
            border: 4px solid #3b82f6;
        }
        #reader video { object-fit: cover !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 pb-24">

    <!-- OVERLAY SCANNER -->
    <div id="scanner-overlay">
        <div id="reader"></div>
        <div class="mt-6 text-center text-white p-4">
            <p class="font-bold text-lg">Pindai Barcode Produk</p>
            <p class="text-xs opacity-60">Pastikan pencahayaan cukup</p>
        </div>
        <button onclick="stopScanning()" class="mt-4 bg-white/10 hover:bg-white/20 text-white px-8 py-3 rounded-2xl font-bold backdrop-blur-md">TUTUP</button>
    </div>

    <!-- HEADER -->
    <header class="bg-white p-4 shadow-sm sticky top-0 z-[100] flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black text-blue-600 italic">SMART POS V4</h1>
            <p id="clock" class="text-[10px] text-slate-400 font-bold uppercase"></p>
        </div>
        <div class="flex gap-2">
            <button onclick="openAddProduct()" class="bg-green-500 text-white p-3 rounded-2xl shadow-lg active:scale-95 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
            </button>
            <button onclick="startScanning('pos')" class="bg-blue-600 text-white p-3 rounded-2xl shadow-lg active:scale-95 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" /></svg>
            </button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="p-4">
        <!-- TAB KASIR -->
        <div id="tab-kasir" class="tab-content active text-center">
            <input type="text" id="search-box" onkeyup="renderProducts()" placeholder="Cari nama barang..." class="w-full p-4 rounded-2xl shadow-sm mb-6 border-none outline-none focus:ring-2 focus:ring-blue-500">
            <div id="product-grid" class="grid grid-cols-2 gap-4"></div>
            <div id="empty-state" class="hidden py-20 text-slate-400">
                <p>Belum ada barang. Klik tombol hijau (+) di atas.</p>
            </div>
        </div>

        <!-- TAB LAPORAN -->
        <div id="tab-laporan" class="tab-content">
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-blue-600 p-4 rounded-[2rem] text-white">
                    <p class="text-[10px] uppercase font-bold opacity-70">Omzet</p>
                    <h2 id="report-omzet" class="text-xl font-black italic">Rp 0</h2>
                </div>
                <div class="bg-green-500 p-4 rounded-[2rem] text-white">
                    <p class="text-[10px] uppercase font-bold opacity-70">Profit</p>
                    <h2 id="report-profit" class="text-xl font-black italic">Rp 0</h2>
                </div>
            </div>
            <div id="history-list" class="space-y-3"></div>
        </div>

        <!-- TAB STOK -->
        <div id="tab-stok" class="tab-content">
            <div id="stock-list" class="space-y-3"></div>
        </div>
    </main>

    <!-- MODAL TAMBAH BARANG -->
    <div id="modal-barang" class="fixed inset-0 bg-black/60 z-[500] hidden flex items-center p-4">
        <div class="bg-white w-full rounded-[2.5rem] p-6 max-h-[90vh] overflow-y-auto shadow-2xl">
            <div class="w-12 h-1 bg-slate-200 mx-auto mb-6 rounded-full"></div>
            <h2 class="text-xl font-black mb-6">Informasi Produk</h2>
            <div class="space-y-4">
                <div class="flex gap-2">
                    <input type="text" id="f-barcode" placeholder="Barcode" class="flex-1 p-4 bg-slate-100 rounded-2xl font-mono text-sm border-none outline-none">
                    <button onclick="startScanning('form')" class="bg-blue-600 text-white px-5 rounded-2xl font-black shadow-lg shadow-blue-200 active:scale-90 transition-transform">SCAN</button>
                </div>
                <input type="text" id="f-nama" placeholder="Nama Barang" class="w-full p-4 bg-slate-100 rounded-2xl border-none outline-none">
                <div class="grid grid-cols-2 gap-2">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Harga Modal</label>
                        <input type="number" id="f-modal" placeholder="0" class="w-full p-4 bg-slate-100 rounded-2xl border-none outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Stok Awal</label>
                        <input type="number" id="f-stok" placeholder="0" class="w-full p-4 bg-slate-100 rounded-2xl border-none outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-blue-600 ml-2 uppercase">Harga Jual Pcs</label>
                        <input type="number" id="f-jual-pcs" placeholder="0" class="w-full p-4 bg-blue-50 rounded-2xl border-none outline-none text-blue-600 font-bold">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-amber-600 ml-2 uppercase">Harga Jual Dus</label>
                        <input type="number" id="f-jual-dus" placeholder="0" class="w-full p-4 bg-amber-50 rounded-2xl border-none outline-none text-amber-600 font-bold">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Isi Per Dus (Contoh: 40)</label>
                    <input type="number" id="f-isi" placeholder="1" class="w-full p-4 bg-slate-100 rounded-2xl border-none outline-none">
                </div>
                <div class="grid grid-cols-2 gap-3 pt-6">
                    <button onclick="closeAddProduct()" class="py-4 text-slate-400 font-bold uppercase text-xs">Batal</button>
                    <button onclick="saveProduct()" class="bg-blue-600 text-white py-4 rounded-[2rem] font-black shadow-lg shadow-blue-200">Simpan Data</button>
                </div>
            </div>
        </div>
    </div>

    <!-- FLOATING CART -->
    <div id="cart-bar" class="fixed bottom-24 left-4 right-4 z-[90] hidden">
        <button onclick="openCart()" class="w-full bg-green-500 text-white p-5 rounded-[2rem] font-black shadow-2xl flex justify-between items-center active:scale-95 transition-transform">
            <span id="cart-count">0 Items</span>
            <span id="cart-total">Rp 0</span>
        </button>
    </div>

    <!-- MODAL KERANJANG -->
    <div id="cart-modal" class="fixed inset-0 bg-black/40 z-[600] hidden flex items-end">
        <div class="bg-white w-full rounded-t-[3rem] p-8 max-h-[85vh] overflow-y-auto shadow-2xl">
            <div class="w-12 h-1.5 bg-slate-200 mx-auto mb-8 rounded-full"></div>
            <div id="cart-items" class="space-y-4 mb-8"></div>
            <div class="flex justify-between items-center mb-8">
                <span class="text-slate-400 font-bold">Total Pembayaran</span>
                <span id="cart-final-total" class="text-2xl font-black text-blue-600">Rp 0</span>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="closeCart()" class="py-4 font-bold text-slate-400 uppercase text-xs">Kembali</button>
                <button onclick="checkout()" class="bg-blue-600 text-white py-5 rounded-[2rem] font-black shadow-lg shadow-blue-100">PROSES BAYAR</button>
            </div>
        </div>
    </div>

    <!-- NAVIGATION -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around p-2 z-[80]">
        <button onclick="switchTab('kasir')" class="nav-btn active-tab flex-1 py-3 text-[10px] font-black uppercase tracking-widest">Kasir</button>
        <button onclick="switchTab('laporan')" class="nav-btn flex-1 py-3 text-slate-300 text-[10px] font-black uppercase tracking-widest">Laporan</button>
        <button onclick="switchTab('stok')" class="nav-btn flex-1 py-3 text-slate-300 text-[10px] font-black uppercase tracking-widest">Stok</button>
    </nav>

    <script>
        // --- DATA & CONFIG ---
        let products = JSON.parse(localStorage.getItem('pos_products')) || [];
        let history = JSON.parse(localStorage.getItem('pos_history')) || [];
        let cart = [];
        let scanner = null;
        let activeMode = ''; // 'pos' atau 'form'

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long' });
        }

        // --- CAMERA SYSTEM (STABLE OVERLAY) ---
        async function startScanning(mode) {
            activeMode = mode;
            document.getElementById('scanner-overlay').style.display = 'flex';
            
            if (!scanner) {
                scanner = new Html5Qrcode("reader");
            }

            const config = { fps: 15, qrbox: { width: 250, height: 180 } };
            
            try {
                await scanner.start({ facingMode: "environment" }, config, onScanSuccess);
            } catch (err) {
                alert("Kamera gagal diakses. Pastikan Anda menggunakan HTTPS.");
                stopScanning();
            }
        }

        async function stopScanning() {
            if (scanner && scanner.isScanning) {
                await scanner.stop();
            }
            document.getElementById('scanner-overlay').style.display = 'none';
        }

        function onScanSuccess(code) {
            vibrate();
            if (activeMode === 'form') {
                document.getElementById('f-barcode').value = code;
                const existing = products.find(p => p.barcode === code);
                if(existing) {
                    document.getElementById('f-nama').value = existing.name;
                    document.getElementById('f-modal').value = existing.modal;
                    document.getElementById('f-jual-pcs').value = existing.pricePcs;
                    document.getElementById('f-jual-dus').value = existing.priceDus;
                    document.getElementById('f-isi').value = existing.content;
                    document.getElementById('f-stok').value = existing.stock;
                }
                stopScanning();
            } else {
                const prod = products.find(p => p.barcode === code);
                if(prod) {
                    addToCart(prod.id, 'pcs');
                    stopScanning(); // Optional: stop setelah dapat 1 barang
                } else {
                    alert("Barang tidak ditemukan: " + code);
                    stopScanning();
                }
            }
        }

        // --- CORE FEATURES ---
        function saveProduct() {
            const data = {
                id: Date.now(),
                barcode: document.getElementById('f-barcode').value,
                name: document.getElementById('f-nama').value,
                modal: Number(document.getElementById('f-modal').value),
                pricePcs: Number(document.getElementById('f-jual-pcs').value),
                priceDus: Number(document.getElementById('f-jual-dus').value),
                content: Number(document.getElementById('f-isi').value) || 1,
                stock: Number(document.getElementById('f-stok').value)
            };

            if(!data.name || !data.barcode) return alert("Nama & Barcode wajib diisi!");

            const idx = products.findIndex(p => p.barcode === data.barcode);
            if(idx !== -1) products[idx] = data;
            else products.push(data);

            localStorage.setItem('pos_products', JSON.stringify(products));
            closeAddProduct();
            renderProducts();
        }

        function addToCart(id, type) {
            const p = products.find(x => x.id === id);
            const key = `${id}-${type}`;
            const existing = cart.find(c => c.key === key);
            const sellPrice = type === 'pcs' ? p.pricePcs : p.priceDus;

            if(existing) existing.qty++;
            else cart.push({ ...p, key, type, sellPrice, qty: 1 });

            updateCartUI();
        }

        function updateCartUI() {
            const total = cart.reduce((s, i) => s + (i.sellPrice * i.qty), 0);
            const count = cart.reduce((s, i) => s + i.qty, 0);

            document.getElementById('cart-bar').style.display = cart.length > 0 ? 'block' : 'none';
            document.getElementById('cart-count').innerText = `${count} Items`;
            document.getElementById('cart-total').innerText = `Rp ${total.toLocaleString()}`;
            document.getElementById('cart-final-total').innerText = `Rp ${total.toLocaleString()}`;

            document.getElementById('cart-items').innerHTML = cart.map(i => `
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl">
                    <div>
                        <p class="font-bold text-sm">${i.name}</p>
                        <p class="text-[10px] text-blue-600 font-black uppercase">${i.type} @ Rp ${i.sellPrice.toLocaleString()}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="changeQty('${i.key}', -1)" class="w-8 h-8 bg-white shadow rounded-full font-bold">-</button>
                        <span class="font-bold text-sm">${i.qty}</span>
                        <button onclick="changeQty('${i.key}', 1)" class="w-8 h-8 bg-white shadow rounded-full font-bold">+</button>
                    </div>
                </div>
            `).join('');
        }

        function changeQty(key, delta) {
            const item = cart.find(c => c.key === key);
            if(item) {
                item.qty += delta;
                if(item.qty <= 0) cart = cart.filter(c => c.key !== key);
            }
            updateCartUI();
        }

        function checkout() {
            if(cart.length === 0) return;
            const total = cart.reduce((s, i) => s + (i.sellPrice * i.qty), 0);
            const modal = cart.reduce((s, i) => {
                const modalSatuan = i.type === 'pcs' ? i.modal : (i.modal * i.content);
                return s + (modalSatuan * i.qty);
            }, 0);

            const trx = {
                id: Date.now(),
                total: total,
                profit: total - modal,
                date: new Date().toISOString(),
                items: [...cart]
            };

            // Potong Stok
            cart.forEach(item => {
                const p = products.find(x => x.id === item.id);
                const qtyDipotong = item.type === 'pcs' ? item.qty : (item.qty * item.content);
                p.stock -= qtyDipotong;
            });

            history.unshift(trx);
            localStorage.setItem('pos_history', JSON.stringify(history));
            localStorage.setItem('pos_products', JSON.stringify(products));

            cart = [];
            updateCartUI();
            closeCart();
            alert("Transaksi Berhasil!");
            renderProducts();
        }

        // --- UI RENDERERS ---
        function renderProducts() {
            const q = document.getElementById('search-box').value.toLowerCase();
            const grid = document.getElementById('product-grid');
            const filtered = products.filter(p => p.name.toLowerCase().includes(q));
            
            document.getElementById('empty-state').style.display = products.length === 0 ? 'block' : 'none';

            grid.innerHTML = filtered.map(p => `
                <div class="bg-white p-4 rounded-[2.5rem] shadow-sm border border-transparent active:border-blue-500 transition-all">
                    <h3 class="font-bold text-xs h-8 overflow-hidden text-slate-500 mb-4">${p.name}</h3>
                    <div class="space-y-2">
                        <button onclick="addToCart(${p.id}, 'pcs')" class="w-full py-3 bg-blue-50 text-blue-600 rounded-2xl text-[10px] font-black uppercase tracking-tighter">Pcs: Rp ${p.pricePcs.toLocaleString()}</button>
                        <button onclick="addToCart(${p.id}, 'dus')" class="w-full py-3 bg-amber-50 text-amber-600 rounded-2xl text-[10px] font-black uppercase tracking-tighter">Dus: Rp ${p.priceDus.toLocaleString()}</button>
                    </div>
                </div>
            `).join('');
        }

        function renderStock() {
            document.getElementById('stock-list').innerHTML = products.map(p => `
                <div class="bg-white p-5 rounded-[2rem] flex justify-between items-center shadow-sm">
                    <div>
                        <p class="font-black text-sm">${p.name}</p>
                        <p class="text-[10px] text-slate-400 font-mono uppercase">${p.barcode}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs font-black ${p.stock < 10 ? 'text-red-500' : 'text-green-500'} italic">Stok: ${p.stock}</p>
                        <button onclick="editProduct(${p.id})" class="text-[10px] font-bold text-blue-600 uppercase underline">Edit</button>
                    </div>
                </div>
            `).join('');
        }

        function renderHistory() {
            const today = new Date().toISOString().split('T')[0];
            const filtered = history.filter(h => h.date.startsWith(today));
            
            const totalOmzet = filtered.reduce((s, h) => s + h.total, 0);
            const totalProfit = filtered.reduce((s, h) => s + h.profit, 0);

            document.getElementById('report-omzet').innerText = `Rp ${totalOmzet.toLocaleString()}`;
            document.getElementById('report-profit').innerText = `Rp ${totalProfit.toLocaleString()}`;

            document.getElementById('history-list').innerHTML = filtered.map(h => `
                <div class="bg-white p-5 rounded-3xl shadow-sm flex justify-between items-center border-l-4 border-blue-600">
                    <div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${new Date(h.date).toLocaleTimeString()}</p>
                        <p class="font-black text-blue-600 italic">Rp ${h.total.toLocaleString()}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-slate-300 font-bold uppercase">Profit</p>
                        <p class="text-xs font-bold text-green-500">+${h.profit.toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
        }

        // --- NAVIGATION & MODALS ---
        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active-tab', 'text-slate-300'));
            
            document.getElementById('tab-' + t).classList.add('active');
            event.currentTarget.classList.add('active-tab');

            if(t === 'stok') renderStock();
            if(t === 'laporan') renderHistory();
            if(t === 'kasir') renderProducts();
        }

        function openAddProduct() { document.getElementById('modal-barang').classList.remove('hidden'); }
        function closeAddProduct() { 
            document.getElementById('modal-barang').classList.add('hidden'); 
            document.getElementById('f-barcode').value = '';
            document.getElementById('f-nama').value = '';
            document.getElementById('f-modal').value = '';
            document.getElementById('f-jual-pcs').value = '';
            document.getElementById('f-jual-dus').value = '';
            document.getElementById('f-stok').value = '';
            document.getElementById('f-isi').value = '';
            stopScanning();
        }
        function openCart() { document.getElementById('cart-modal').classList.remove('hidden'); }
        function closeCart() { document.getElementById('cart-modal').classList.add('hidden'); }
        function editProduct(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('f-barcode').value = p.barcode;
            document.getElementById('f-nama').value = p.name;
            document.getElementById('f-modal').value = p.modal;
            document.getElementById('f-jual-pcs').value = p.pricePcs;
            document.getElementById('f-jual-dus').value = p.priceDus;
            document.getElementById('f-stok').value = p.stock;
            document.getElementById('f-isi').value = p.content;
            openAddProduct();
        }
        function vibrate() { if(navigator.vibrate) navigator.vibrate(100); }

        setInterval(updateClock, 1000);
        updateClock();
        renderProducts();
    </script>
</body>
</html>
