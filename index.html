<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Pro - Fixed Camera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-tab { border-bottom: 4px solid #2563eb; color: #2563eb; }
        #scanner-wrapper {
            position: relative;
            z-index: 100;
            background: black;
            border-radius: 1.5rem;
            overflow: hidden;
        }
        /* Memastikan video memenuhi container */
        #reader video { object-fit: cover !important; }
    </style>
</head>
<body class="bg-slate-50 pb-24">

    <header class="bg-white p-4 shadow-sm sticky top-0 z-[80] flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black text-blue-600">SMART POS</h1>
            <p id="date-now" class="text-[10px] text-slate-400 font-bold uppercase"></p>
        </div>
        <div class="flex gap-2">
            <button onclick="openAddProduct()" class="bg-green-500 text-white p-3 rounded-2xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
            </button>
            <button onclick="toggleScanner('pos')" class="bg-blue-600 text-white p-3 rounded-2xl shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" /></svg>
            </button>
        </div>
    </header>

    <main class="p-4">
        <!-- FIXED SCANNER WRAPPER -->
        <div id="scanner-wrapper" class="hidden mb-4 shadow-xl">
            <div id="reader" style="width: 100%; min-height: 250px;"></div>
            <button onclick="stopScanner()" class="w-full py-2 bg-red-500 text-white font-bold text-xs">TUTUP KAMERA</button>
        </div>

        <!-- TAB KASIR -->
        <div id="tab-kasir" class="tab-content active">
            <input type="text" id="search-box" onkeyup="renderProducts()" placeholder="Cari barang..." class="w-full p-4 rounded-2xl shadow-sm mb-4 border-none outline-none focus:ring-2 focus:ring-blue-500">
            <div class="grid grid-cols-2 gap-3" id="product-grid"></div>
        </div>

        <!-- TAB STOK -->
        <div id="tab-stok" class="tab-content">
            <div id="stock-list" class="space-y-3"></div>
        </div>
    </main>

    <!-- MODAL TAMBAH BARANG -->
    <div id="modal-barang" class="fixed inset-0 bg-black/60 z-[150] hidden flex items-center p-4">
        <div class="bg-white w-full rounded-[2.5rem] p-6 max-h-[90vh] overflow-y-auto">
            <h2 class="text-xl font-black mb-4">Master Barang</h2>
            <div class="space-y-4">
                <div class="flex gap-2">
                    <input type="text" id="f-barcode" placeholder="Barcode" class="flex-1 p-3 bg-slate-100 rounded-xl font-mono">
                    <button onclick="toggleScanner('form')" class="bg-blue-600 text-white px-4 rounded-xl font-bold">SCAN</button>
                </div>
                <input type="text" id="f-nama" placeholder="Nama Barang" class="w-full p-3 bg-slate-100 rounded-xl">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="f-modal" placeholder="Harga Modal" class="p-3 bg-slate-100 rounded-xl">
                    <input type="number" id="f-stok" placeholder="Stok Awal" class="p-3 bg-slate-100 rounded-xl">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="f-jual-pcs" placeholder="Harga Pcs" class="p-3 bg-blue-50 rounded-xl border border-blue-200">
                    <input type="number" id="f-jual-dus" placeholder="Harga Dus" class="p-3 bg-amber-50 rounded-xl border border-amber-200">
                </div>
                <input type="number" id="f-isi" placeholder="Isi per Dus" class="w-full p-3 bg-slate-100 rounded-xl">
                
                <div class="grid grid-cols-2 gap-3 pt-4">
                    <button onclick="closeAddProduct()" class="w-full py-4 text-slate-400 font-bold">BATAL</button>
                    <button onclick="saveProduct()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black">SIMPAN</button>
                </div>
            </div>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2 z-[90]">
        <button onclick="switchTab('kasir')" class="nav-btn active-tab flex-1 py-2 font-bold text-[10px]">KASIR</button>
        <button onclick="switchTab('stok')" class="nav-btn flex-1 py-2 font-bold text-[10px] text-slate-400">BARANG</button>
    </nav>

    <script>
        let products = JSON.parse(localStorage.getItem('pos_products')) || [];
        let html5QrCode; 

        function init() {
            document.getElementById('date-now').innerText = new Date().toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long' });
            renderProducts();
        }

        // --- FIXED SCANNER LOGIC ---
        async function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                try {
                    await html5QrCode.stop();
                    document.getElementById('scanner-wrapper').classList.add('hidden');
                } catch (err) {
                    console.error("Gagal stop kamera:", err);
                }
            } else {
                document.getElementById('scanner-wrapper').classList.add('hidden');
            }
        }

        async function toggleScanner(mode) {
            const wrapper = document.getElementById('scanner-wrapper');
            
            // 1. Matikan scanner yang sedang berjalan (jika ada)
            await stopScanner();

            // 2. Jika wrapper tadi tersembunyi, sekarang kita nyalakan
            wrapper.classList.remove('hidden');
            
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            const config = { fps: 15, qrbox: { width: 250, height: 150 } };

            try {
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config,
                    (decodedText) => {
                        if (mode === 'pos') {
                            handleScanKasir(decodedText);
                        } else {
                            handleScanForm(decodedText);
                        }
                    }
                );
            } catch (err) {
                alert("Kamera gagal diakses. Pastikan izin kamera aktif & gunakan HTTPS.");
                wrapper.classList.add('hidden');
            }
        }

        function handleScanKasir(code) {
            const prod = products.find(p => p.barcode === code);
            if(prod) {
                alert("Berhasil scan: " + prod.name);
                // Logika tambah ke keranjang Anda di sini
            } else {
                alert("Barang tidak ditemukan: " + code);
            }
            vibrate();
        }

        function handleScanForm(code) {
            document.getElementById('f-barcode').value = code;
            stopScanner(); // Langsung tutup kamera setelah dapat barcode di form
            vibrate();
            
            // Cek jika produk sudah ada untuk auto-fill
            const prod = products.find(p => p.barcode === code);
            if(prod) {
                document.getElementById('f-nama').value = prod.name;
                document.getElementById('f-modal').value = prod.modal;
                document.getElementById('f-jual-pcs').value = prod.pricePcs;
                document.getElementById('f-jual-dus').value = prod.priceDus;
                document.getElementById('f-isi').value = prod.content;
                document.getElementById('f-stok').value = prod.stock;
            }
        }

        // --- PRODUCT MANAGEMENT ---
        function openAddProduct() {
            document.getElementById('modal-barang').classList.remove('hidden');
        }

        async function closeAddProduct() {
            await stopScanner();
            document.getElementById('modal-barang').classList.add('hidden');
            // Reset form
            document.getElementById('f-barcode').value = '';
            document.getElementById('f-nama').value = '';
        }

        function saveProduct() {
            const barcode = document.getElementById('f-barcode').value;
            const newProd = {
                id: Date.now(),
                name: document.getElementById('f-nama').value,
                barcode: barcode,
                modal: Number(document.getElementById('f-modal').value),
                pricePcs: Number(document.getElementById('f-jual-pcs').value),
                priceDus: Number(document.getElementById('f-jual-dus').value),
                content: Number(document.getElementById('f-isi').value),
                stock: Number(document.getElementById('f-stok').value)
            };

            const index = products.findIndex(p => p.barcode === barcode);
            if(index !== -1) products[index] = newProd;
            else products.push(newProd);

            localStorage.setItem('pos_products', JSON.stringify(products));
            renderProducts();
            closeAddProduct();
        }

        function renderProducts() {
            const q = document.getElementById('search-box').value.toLowerCase();
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.filter(p => p.name.toLowerCase().includes(q)).map(p => `
                <div class="bg-white p-4 rounded-3xl shadow-sm">
                    <h3 class="font-bold text-sm h-10 overflow-hidden text-slate-600">${p.name}</h3>
                    <div class="mt-2 text-[10px] font-black text-blue-600">PCS: Rp ${p.pricePcs.toLocaleString()}</div>
                    <div class="text-[10px] font-black text-amber-600">DUS: Rp ${p.priceDus.toLocaleString()}</div>
                </div>
            `).join('');
        }

        async function switchTab(t) {
            await stopScanner();
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.add('text-slate-400'));
            document.getElementById('tab-'+t).classList.add('active');
            event.currentTarget.classList.remove('text-slate-400');
            if(t === 'stok') renderStock();
        }

        function renderStock() {
            const list = document.getElementById('stock-list');
            list.innerHTML = products.map(p => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                    <div><p class="font-bold text-sm">${p.name}</p><p class="text-[10px] text-slate-400 uppercase">${p.barcode}</p></div>
                    <div class="text-right"><p class="text-xs font-black text-blue-600">Stok: ${p.stock}</p></div>
                </div>
            `).join('');
        }

        function vibrate() { if(navigator.vibrate) navigator.vibrate(100); }

        init();
    </script>
</body>
</html>
