<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Ultimate Pro - Satuan & Grosir</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-tab { border-bottom: 4px solid #2563eb; color: #2563eb; }
        @media print {
            body * { visibility: hidden; }
            #receipt-print, #receipt-print * { visibility: visible; }
            #receipt-print { position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 pb-20">

    <!-- HEADER -->
    <header class="bg-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black text-blue-600">SMART POS</h1>
            <p id="date-now" class="text-[10px] text-slate-400 font-bold uppercase"></p>
        </div>
        <button onclick="toggleScanner()" class="bg-blue-600 text-white p-3 rounded-2xl shadow-lg active:scale-95 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
            </svg>
        </button>
    </header>

    <!-- MAIN CONTENT -->
    <main class="p-4">
        
        <!-- SCANNER VIEW -->
        <div id="scanner-wrapper" class="hidden mb-4 overflow-hidden rounded-3xl shadow-inner bg-black">
            <div id="reader"></div>
        </div>

        <!-- TABS -->
        <div id="tab-kasir" class="tab-content active">
            <input type="text" id="search-box" onkeyup="renderProducts()" placeholder="Cari produk..." class="w-full p-4 rounded-2xl border-none shadow-sm mb-4 outline-none focus:ring-2 focus:ring-blue-500">
            
            <div class="grid grid-cols-2 gap-3" id="product-grid"></div>
        </div>

        <div id="tab-laporan" class="tab-content">
            <div class="bg-white p-4 rounded-3xl shadow-sm mb-4">
                <canvas id="salesChart"></canvas>
            </div>
            <div id="history-list" class="space-y-3"></div>
        </div>

        <div id="tab-stok" class="tab-content">
            <div id="stock-list" class="space-y-2"></div>
        </div>
    </main>

    <!-- FOOTER NAV -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2 z-50">
        <button onclick="switchTab('kasir')" class="nav-btn active-tab flex-1 py-2 flex flex-col items-center font-bold text-[10px]">KASIR</button>
        <button onclick="switchTab('laporan')" class="nav-btn flex-1 py-2 flex flex-col items-center font-bold text-[10px] text-slate-400">LAPORAN</button>
        <button onclick="switchTab('stok')" class="nav-btn flex-1 py-2 flex flex-col items-center font-bold text-[10px] text-slate-400">STOK</button>
    </nav>

    <!-- CHECKOUT MODAL (BOTTOM SHEET) -->
    <div id="cart-sheet" class="fixed inset-0 bg-black/40 z-[60] hidden flex items-end">
        <div class="bg-white w-full rounded-t-[2.5rem] p-6 animate-slide-up">
            <div class="w-12 h-1.5 bg-slate-200 mx-auto mb-6 rounded-full"></div>
            <h2 class="text-xl font-black mb-4">Keranjang Belanja</h2>
            
            <div id="cart-items" class="max-h-[40vh] overflow-y-auto space-y-4 mb-6"></div>

            <div class="border-t border-dashed py-4 mb-6">
                <div class="flex justify-between text-slate-500 mb-1">
                    <span>Subtotal</span>
                    <span id="subtotal-val">Rp 0</span>
                </div>
                <div class="flex justify-between items-center font-black text-2xl text-blue-600">
                    <span>TOTAL</span>
                    <span id="total-val">Rp 0</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="closeCart()" class="bg-slate-100 text-slate-600 py-4 rounded-2xl font-bold">KEMBALI</button>
                <button onclick="processPayment()" class="bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200">BAYAR SEKARANG</button>
            </div>
        </div>
    </div>

    <!-- FLOATING CART BUTTON -->
    <div id="floating-cart" class="fixed bottom-24 left-4 right-4 z-40 hidden">
        <button onclick="openCart()" class="w-full bg-green-500 text-white p-4 rounded-2xl font-bold shadow-2xl flex justify-between items-center">
            <span id="cart-count">0 Items</span>
            <span id="cart-preview-total">Rp 0</span>
        </button>
    </div>

    <!-- RECEIPT PRINT AREA (HIDDEN) -->
    <div id="receipt-print" class="p-8 font-mono text-sm">
        <center>
            <h1 class="font-bold">TOKO SUMBER BERKAH</h1>
            <p>Terima Kasih Telah Berbelanja</p>
            <p>--------------------------------</p>
        </center>
        <div id="receipt-content"></div>
        <p>--------------------------------</p>
        <div id="receipt-total-area"></div>
        <center><p id="receipt-time" class="mt-4"></p></center>
    </div>

    <script>
        // DATA MASTER (Produk dengan harga PCS & DUS)
        let products = [
            { id: 1, name: 'Mie Instan', pricePcs: 3500, priceDus: 125000, content: 40, barcode: '8998866200578', stock: 100 },
            { id: 2, name: 'Susu UHT', pricePcs: 6500, priceDus: 145000, content: 24, barcode: '8998009010226', stock: 50 },
            { id: 3, name: 'Kopi Sachet', pricePcs: 2000, priceDus: 35000, content: 20, barcode: '8991001110051', stock: 200 },
            { id: 4, name: 'Air Mineral 600ml', pricePcs: 4000, priceDus: 45000, content: 24, barcode: '8886008101053', stock: 120 }
        ];

        let cart = [];
        let history = JSON.parse(localStorage.getItem('pos_history')) || [];
        let scanner;

        function init() {
            document.getElementById('date-now').innerText = new Date().toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long' });
            renderProducts();
            updateChart();
        }

        // --- NAVIGATION ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('text-slate-400'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-tab'));
            
            document.getElementById('tab-' + tab).classList.add('active');
            event.currentTarget.classList.remove('text-slate-400');
            event.currentTarget.classList.add('active-tab');

            if(tab === 'laporan') renderHistory();
            if(tab === 'stok') renderStock();
        }

        // --- RENDER PRODUCTS ---
        function renderProducts() {
            const query = document.getElementById('search-box').value.toLowerCase();
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.filter(p => p.name.toLowerCase().includes(query)).map(p => `
                <div class="bg-white p-4 rounded-[2rem] shadow-sm border border-transparent active:border-blue-500">
                    <h3 class="font-bold text-sm mb-3">${p.name}</h3>
                    <div class="space-y-2">
                        <button onclick="addToCart(${p.id}, 'pcs')" class="w-full py-2 bg-blue-50 text-blue-600 rounded-xl text-[10px] font-black">PCS: Rp ${p.pricePcs.toLocaleString()}</button>
                        <button onclick="addToCart(${p.id}, 'dus')" class="w-full py-2 bg-amber-50 text-amber-600 rounded-xl text-[10px] font-black">DUS: Rp ${p.priceDus.toLocaleString()}</button>
                    </div>
                </div>
            `).join('');
        }

        // --- CART LOGIC ---
        function addToCart(id, type) {
            const product = products.find(p => p.id === id);
            const cartKey = `${id}-${type}`;
            const inCart = cart.find(item => item.cartKey === cartKey);

            if (inCart) {
                inCart.qty++;
            } else {
                cart.push({
                    ...product,
                    cartKey: cartKey,
                    sellType: type,
                    sellPrice: type === 'pcs' ? product.pricePcs : product.priceDus,
                    qty: 1
                });
            }
            updateCartUI();
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function updateCartUI() {
            const total = cart.reduce((sum, i) => sum + (i.sellPrice * i.qty), 0);
            const count = cart.reduce((sum, i) => sum + i.qty, 0);

            document.getElementById('cart-count').innerText = `${count} Items`;
            document.getElementById('cart-preview-total').innerText = `Rp ${total.toLocaleString()}`;
            document.getElementById('total-val').innerText = `Rp ${total.toLocaleString()}`;
            document.getElementById('subtotal-val').innerText = `Rp ${total.toLocaleString()}`;

            const btn = document.getElementById('floating-cart');
            if(cart.length > 0) btn.classList.remove('hidden'); else btn.classList.add('hidden');
            
            renderCartList();
        }

        function renderCartList() {
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map(item => `
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl">
                    <div>
                        <p class="font-bold text-sm">${item.name} (${item.sellType.toUpperCase()})</p>
                        <p class="text-xs text-blue-600 font-black">Rp ${item.sellPrice.toLocaleString()}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <button onclick="changeQty('${item.cartKey}', -1)" class="w-8 h-8 bg-white shadow-sm rounded-full font-bold">-</button>
                        <span class="font-bold">${item.qty}</span>
                        <button onclick="changeQty('${item.cartKey}', 1)" class="w-8 h-8 bg-white shadow-sm rounded-full font-bold">+</button>
                    </div>
                </div>
            `).join('');
        }

        function changeQty(key, delta) {
            const item = cart.find(i => i.cartKey === key);
            if(item) {
                item.qty += delta;
                if(item.qty <= 0) cart = cart.filter(i => i.cartKey !== key);
            }
            updateCartUI();
        }

        function openCart() { document.getElementById('cart-sheet').classList.remove('hidden'); }
        function closeCart() { document.getElementById('cart-sheet').classList.add('hidden'); }

        // --- SCANNER ---
        function toggleScanner() {
            const wrapper = document.getElementById('scanner-wrapper');
            if(wrapper.classList.contains('hidden')) {
                wrapper.classList.remove('hidden');
                scanner = new Html5Qrcode("reader");
                scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                    const prod = products.find(p => p.barcode === text);
                    if(prod) addToCart(prod.id, 'pcs');
                });
            } else {
                scanner.stop();
                wrapper.classList.add('hidden');
            }
        }

        // --- PAYMENT & PRINT ---
        function processPayment() {
            if(cart.length === 0) return;
            const total = cart.reduce((sum, i) => sum + (i.sellPrice * i.qty), 0);
            
            // Simpan Riwayat
            const trx = { id: Date.now(), items: [...cart], total: total, time: new Date().toLocaleTimeString() };
            history.unshift(trx);
            localStorage.setItem('pos_history', JSON.stringify(history));

            // Kurangi Stok
            cart.forEach(item => {
                const p = products.find(prod => prod.id === item.id);
                const dec = item.sellType === 'pcs' ? item.qty : (item.qty * item.content);
                p.stock -= dec;
            });

            // Cetak Struk
            document.getElementById('receipt-content').innerHTML = cart.map(i => `
                <div style="display:flex;justify-content:space-between">
                    <span>${i.name} x${i.qty}</span>
                    <span>${(i.sellPrice * i.qty).toLocaleString()}</span>
                </div>
            `).join('');
            document.getElementById('receipt-total-area').innerHTML = `<h2 style="text-align:right">TOTAL: Rp ${total.toLocaleString()}</h2>`;
            document.getElementById('receipt-time').innerText = new Date().toLocaleString();
            
            window.print();

            cart = [];
            updateCartUI();
            closeCart();
            alert("Transaksi Berhasil!");
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = history.slice(0,10).map(h => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-blue-600">
                    <div class="flex justify-between text-[10px] text-slate-400 font-bold mb-1">
                        <span>TRX-${h.id}</span>
                        <span>${h.time}</span>
                    </div>
                    <p class="font-black">Rp ${h.total.toLocaleString()}</p>
                </div>
            `).join('');
        }

        function renderStock() {
            const list = document.getElementById('stock-list');
            list.innerHTML = products.map(p => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                    <div>
                        <p class="font-bold text-sm">${p.name}</p>
                        <p class="text-[10px] text-slate-400">Barcode: ${p.barcode}</p>
                    </div>
                    <span class="px-3 py-1 rounded-full text-[10px] font-black ${p.stock < 20 ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">
                        STOK: ${p.stock}
                    </span>
                </div>
            `).join('');
        }

        function updateChart() {
            const ctx = document.getElementById('salesChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.slice(0,5).map(h => h.time).reverse(),
                    datasets: [{
                        label: 'Penjualan',
                        data: history.slice(0,5).map(h => h.total).reverse(),
                        borderColor: '#2563eb',
                        tension: 0.4
                    }]
                },
                options: { plugins: { legend: { display: false } } }
            });
        }

        init();
    </script>
</body>
</html>
